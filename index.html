<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL SAND ART - V4.5.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Pixelify Sans', sans-serif;
            color: #00ff00;
            user-select: none;
        }
        canvas {
            display: block;
            touch-action: none;
            cursor: crosshair;
        }
        #menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            z-index: 100;
            overflow-y: auto;
            border: 2px solid #222;
        }
        #menu-overlay.active {
            display: flex;
        }
        .terminal-header {
            width: 100%;
            max-width: 900px;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            text-align: left;
        }
        .terminal-header h2 {
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
            letter-spacing: 1px;
        }
        .settings-panel {
            background: #050505;
            padding: 15px;
            border: 1px solid #222;
            margin-bottom: 20px;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .setting-label {
            font-size: 9px;
            color: #00ff00;
            opacity: 0.6;
            text-transform: uppercase;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 900px;
        }
        .btn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 6px 12px;
            cursor: pointer;
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 10px;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        .btn:hover {
            background: #00ff00;
            color: #000;
        }
        .btn.active {
            background: #00ff00;
            color: #000;
        }
        
        details {
            width: 100%;
            max-width: 900px;
            border: 1px solid #222;
            margin-bottom: 5px;
            background: #080808;
        }
        summary {
            padding: 10px;
            cursor: pointer;
            font-size: 11px;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
        }
        details[open] summary {
            border-bottom: 1px solid #222;
            color: #fff;
        }
        .effect-category-content {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            padding: 15px;
        }

        .effect-item-wrapper {
            background: #0c0c0c;
            border: 1px solid #1a1a1a;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .effect-row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .effect-name { font-size: 10px; color: #666; }
        .active-text { color: #00ff00 !important; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #1a1a1a;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00ff00;
            border: 1px solid #000;
        }
        .strength-label {
            font-size: 9px;
            color: #444;
            display: flex;
            justify-content: space-between;
        }

        .palette-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            width: 100%;
        }
        .palette-container .btn {
            font-size: 8.5px;
            padding: 4px 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #save-indicator {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 9px;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="save-indicator">>> DATA_SYNCED</div>

    <div id="menu-overlay">
        <div class="terminal-header">
            <h2>V4.5.9</h2>
        </div>

        <div class="settings-panel">
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div class="setting-group">
                    <span class="setting-label">EDGE_DYNAMICS</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn active" id="btn-soft">[ SOFT ]</button>
                        <button class="btn" id="btn-hard">[ HARD ]</button>
                    </div>
                </div>
                <div class="setting-group">
                    <span class="setting-label">LUMA_MAP</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn" id="btn-velocity-luma">[ VELOCITY ]</button>
                    </div>
                </div>
            </div>
            <div class="setting-group">
                <span class="setting-label">COLOR_REGISTRY (5-WIDE)</span>
                <div class="palette-container" id="palette-list"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="toggle-all">[ Toggle_All ]</button>
            <button class="btn" id="randomise">[ RANDOMISE ]</button>
            <button class="btn" id="close-menu">[ RESUME ]</button>
        </div>
        
        <details open>
            <summary><span>[ ORGANIC_STRUCTURES ]</span><span>+</span></summary>
            <div class="effect-category-content" id="cat-organic"></div>
        </details>

        <details open>
            <summary><span>[ FLUID_DYNAMICS ]</span><span>+</span></summary>
            <div class="effect-category-content" id="cat-fluid"></div>
        </details>

        <details open>
            <summary><span>[ CHROMA_OPERATORS ]</span><span>+</span></summary>
            <div class="effect-category-content" id="cat-chroma"></div>
        </details>
        
        <div style="height: 100px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-sand-art';

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const menu = document.getElementById('menu-overlay');

        let width = 0, height = 0;
        let particles = [];
        let cells = [];
        let user = null;
        let particleCount = 0; 
        const CELL_COUNT = 5; 
        const FRICTION = 0.94; 
        const BASE_SPEED = 0.5;
        const MAX_PARTICLES = 120000;

        const EFFECT_NAMES = [
            "Lorenz Attractor", "Galaxy Spiral", "Wind Gusts", "Ripples", "Hex Grid [O]", 
            "Diamond Lattice [O]", "Vortex", "Divergence", "Convergence", "Shear",
            "Radial Comb", "Cross Wind", "Vertical Gusts", "Orbitals", "Square Wave", 
            "Bubble Repulsion", "Chaos Mix", "Warp Drive", "Mirror Center", "Crystallize [O]",
            "Turbulent Flow", "Sine Sieve", "Expansion Pulse", "Tangent Twist", "DNA Spiral",
            "Perlin Drift", "Concentric Spin", "Zoom Out", "Magnetic North", "Maze Runner",
            "Concentric Squares [O]", "Dotted Grid [O]", "Vertical Pinstripes [O]", "Diagonal Crosshatch [O]", "Honeycomb [O]",
            "Radial Spokes [O]", "Ziggurat [O]", "Dotted Spirals [O]", "Checkerboard Push [O]", "Diamond Dot Array [O]",
            "Fibonacci Spiral [O]", "Mandelbrot Boundary [O]", "Voronoi Cells [O]", "Hilbert Curve [O]", "Binary Tree [O]",
            "Isometric Cube [O]", "Radar Sweep [O]", "Circuit Board [O]", "Tartan Plaid [O]", "Serendipity Dots [O]", 
            "Weave Lattice [O]", "Luma Attraction [C]", "RGB Spectral Drift [C]", "Chrome Saturation Sort [C]", 
            "Red/Blue Divergence [C]", "Green Channel Sieve [C]", "Color Gradient Snap [C]", "Hue Orbital Ring [C]", 
            "Inverse Luma Push [C]", "Warm/Cool Shear [C]", "Luma Staircase [C]", "RGB Corner Sort [C]", 
            "Saturation Barrier [C]", "Hue Angular Mapper [C]", "Primary Spin [C]", "Intensity Well [C]", 
            "CMY Divergence [C]", "Chromatic Wave [C]", "Color Grid Snap [C]"
        ];

        let config = {
            hardEdges: false,
            velocityLuma: false,
            palette: 'cycle_strobe', 
            grainSize: 1 
        };

        let enabledEffects = new Array(EFFECT_NAMES.length).fill(true);
        let effectStrengths = new Array(EFFECT_NAMES.length).fill(100);

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) loadState();
        });

        initAuth();

        async function saveState() {
            if (!user) return;
            try {
                const stateRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'current');
                await setDoc(stateRef, {
                    config,
                    enabledEffects,
                    effectStrengths,
                    timestamp: Date.now()
                });
                const ind = document.getElementById('save-indicator');
                ind.style.opacity = 1;
                setTimeout(() => ind.style.opacity = 0, 2000);
            } catch (err) { console.error("Save failed", err); }
        }

        async function loadState() {
            if (!user) return;
            const stateRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'current');
            const snap = await getDoc(stateRef);
            if (snap.exists()) {
                const data = snap.data();
                Object.assign(config, data.config);
                enabledEffects = data.enabledEffects;
                effectStrengths = data.effectStrengths;
                document.getElementById('btn-soft').classList.toggle('active', !config.hardEdges);
                document.getElementById('btn-hard').classList.toggle('active', config.hardEdges);
                document.getElementById('btn-velocity-luma').classList.toggle('active', config.velocityLuma);
                resize();
                buildMenu();
            } else {
                resize();
                buildMenu();
            }
        }

        let lastFrameTime = performance.now();

        function lerpColor(c1, c2, t) {
            return {
                r: Math.round(c1.r + (c2.r - c1.r) * t),
                g: Math.round(c1.g + (c2.g - c1.g) * t),
                b: Math.round(c1.b + (c2.b - c1.b) * t)
            };
        }

        function generateCyclicLUT(stops) {
            const lut = [];
            const steps = 360;
            for (let i = 0; i < steps; i++) {
                const t = (i / steps) * stops.length;
                const idx1 = Math.floor(t) % stops.length;
                const idx2 = (idx1 + 1) % stops.length;
                lut.push(lerpColor(stops[idx1], stops[idx2], t % 1));
            }
            return lut;
        }

        const CYCLIC_PALETTES = {
            cycle_rainbow: generateCyclicLUT([{r:255,g:0,b:0},{r:255,g:255,b:0},{r:0,g:255,b:0},{r:0,g:255,b:255},{r:0,g:0,b:255},{r:255,g:0,b:255}]),
            cycle_strobe: generateCyclicLUT([{r:0,g:0,b:0},{r:85,g:85,b:85},{r:170,g:170,b:170},{r:255,g:255,b:255}]),
            cycle_toxic: generateCyclicLUT([{r:173,g:255,b:47},{r:255,g:255,b:0},{r:50,g:205,b:50}]),
            cycle_abyss: generateCyclicLUT([{r:0,g:10,b:30},{r:0,g:255,b:255},{r:0,g:100,b:150}]),
            cycle_glitch: generateCyclicLUT([{r:255,g:0,b:255},{r:0,g:255,b:255},{r:255,g:255,b:255}]),
            cycle_forest: generateCyclicLUT([{r:0,g:40,b:10},{r:34,g:139,b:34},{r:107,g:142,b:35}]),
            cycle_volcano: generateCyclicLUT([{r:40,g:0,b:0},{r:255,g:69,b:0},{r:255,g:215,b:0}]),
            cycle_nebula: generateCyclicLUT([{r:75,g:0,b:130},{r:199,g:21,b:133},{r:0,g:0,b:139}]),
            cycle_gold: generateCyclicLUT([{r:101,g:67,b:33},{r:255,g:215,b:0},{r:255,g:255,b:200}]),
            cycle_ghost: generateCyclicLUT([{r:255,g:255,b:255},{r:176,g:196,b:222},{r:72,g:61,b:139}]),
            cycle_plasma: generateCyclicLUT([{r:148,g:0,b:211},{r:75,g:0,b:130},{r:255,g:0,b:255}]),
            cycle_seafoam: generateCyclicLUT([{r:64,g:224,b:208},{r:127,g:255,b:212},{r:0,g:128,b:128}])
        };
        
        const STATIC_PALETTES = {
            spectrum: [{r:255,g:0,b:0},{r:255,g:255,b:0},{r:0,g:255,b:0},{r:0,g:255,b:255},{r:0,g:0,b:255},{r:255,g:0,b:255}],
            neon: [{r:255,g:0,b:128},{r:0,g:255,b:255},{r:128,g:0,b:255},{r:255,g:255,b:255}],
            sunset: [{r:255,g:50,b:0},{r:255,g:200,b:0},{r:100,g:0,b:150},{r:255,g:255,b:200}],
            deepsea: [{r:0,g:20,b:50},{r:0,g:255,b:150},{r:0,g:100,b:255},{r:200,g:255,b:255}],
            sand: [{r:230,g:204,b:178},{r:221,g:184,b:146},{r:176,g:137,b:104},{r:127,g:85,b:57},{r:254,g:250,b:224}],
            matrix: [{r:0,g:40,b:0},{r:0,g:255,b:70},{r:20,g:100,b:20},{r:0,g:255,b:0}],
            cyber: [{r:255,g:0,b:255},{r:0,g:255,b:255},{r:255,g:255,b:0},{r:255,g:0,b:100}],
            magma: [{r:40,g:0,b:0},{r:255,g:0,b:0},{r:255,g:120,b:0},{r:255,g:255,b:0}],
            frost: [{r:0,g:50,b:100},{r:100,g:200,b:255},{r:200,g:255,b:255},{r:255,g:255,b:255}],
            forest: [{r:0,g:20,b:10},{r:34,g:139,b:34},{r:107,g:142,b:35},{r:210,g:180,b:140}],
            vapor: [{r:255,g:113,b:206},{r:1,g:205,b:254},{r:5,g:255,b:161},{r:185,g:103,b:255},{r:255,g:251,b:150}],
            royal: [{r:75,g:0,b:130},{r:255,g:215,b:0},{r:139,g:0,b:139},{r:218,g:165,b:32}],
            autumn: [{r:139,g:69,b:19},{r:210,g:105,b:30},{r:255,g:140,b:0},{r:255,g:69,b:0}],
            toxic: [{r:173,g:255,b:47},{r:148,g:0,b:211},{r:50,g:205,b:50},{r:139,g:0,b:139}],
            berry: [{r:0,g:0,b:139},{r:220,g:20,b:60},{r:199,g:21,b:133},{r:75,g:0,b:130}],
            midnight: [{r:25,g:25,b:112},{r:0,g:0,b:205},{r:72,g:61,b:139},{r:176,g:196,b:222}],
            coral: [{r:255,g:127,b:80},{r:64,g:224,b:208},{r:255,g:99,b:71},{r:127,g:255,b:212}],
            synth: [{r:36,g:0,b:70},{r:90,g:24,b:154},{r:157,g:78,b:221},{r:255,g:0,b:110}],
            pastel: [{r:255,g:179,b:186},{r:255,g:255,b:186},{r:186,g:255,b:201},{r:186,g:225,b:255}],
            monogold: [{r:101,g:67,b:33},{r:255,g:215,b:0},{r:218,g:165,b:32},{r:255,g:255,b:150}]
        };

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * (width || 1);
                this.y = Math.random() * (height || 1);
                this.vx = 0; this.vy = 0;
                this.phase = Math.floor(Math.random() * 360);
                this.assignColor();
            }
            assignColor() {
                if (CYCLIC_PALETTES[config.palette]) {
                    const idx = Math.floor(this.phase) % 360;
                    const c = CYCLIC_PALETTES[config.palette][idx];
                    this.r = c.r; this.g = c.g; this.b = c.b;
                } else {
                    const palette = STATIC_PALETTES[config.palette] || STATIC_PALETTES['spectrum'];
                    const t = Math.max(0, Math.min(1, (this.x / (width || 1) + this.y / (height || 1)) / 2));
                    const scaledT = t * (palette.length - 1);
                    const i = Math.floor(scaledT);
                    const f = scaledT - i;
                    const nextI = Math.min(i + 1, palette.length - 1);
                    const c = lerpColor(palette[i], palette[nextI], f);
                    this.r = c.r; this.g = c.g; this.b = c.b;
                }
                this.luma = (this.r + this.g + this.b) / 3;
            }
            update(dt) {
                if (isNaN(this.x) || isNaN(this.y)) this.init();
                this.x += this.vx * BASE_SPEED * dt;
                this.y += this.vy * BASE_SPEED * dt;
                const f = Math.pow(FRICTION, dt);
                this.vx *= f; this.vy *= f;
                if (CYCLIC_PALETTES[config.palette]) {
                    let cycleSpeed = config.palette === 'cycle_strobe' ? 15.0 : 1.0;
                    this.phase = (this.phase + cycleSpeed * dt) % 360;
                    const c = CYCLIC_PALETTES[config.palette][Math.floor(this.phase) % 360];
                    if (c) { this.r = c.r; this.g = c.g; this.b = c.b; this.luma = (this.r + this.g + this.b) / 3; }
                }
                if (this.x < 0) this.x += width; else if (this.x >= width) this.x -= width;
                if (this.y < 0) this.y += height; else if (this.y >= height) this.y -= height;
            }
        }

        class Cell {
            constructor(id) {
                this.id = id; this.x = Math.random() * (width || 1);
                this.y = Math.random() * (height || 1);
                this.vx = 0; this.vy = 0;
                this.targetVx = 0; this.targetVy = 0;
                this.moveTimer = 0; this.reset();
            }
            reset() {
                const canvasMin = Math.min(width, height) || 1;
                const scale = 0.26 + Math.random() * 0.26;
                this.sizeW = canvasMin * scale; this.sizeH = canvasMin * scale;
                const validIndices = enabledEffects.map((val, idx) => val ? idx : -1).filter(idx => idx !== -1);
                this.effectIndex = validIndices.length > 0 ? validIndices[Math.floor(Math.random() * validIndices.length)] : 0;
                this.timer = 0; this.duration = 10000 + Math.random() * 5000;
                this.rotation = 0; this.strengthBase = (0.6 + Math.random() * 2.4);
                this.changeMovement();
            }
            changeMovement() {
                const angle = (Math.floor(Math.random() * 4)) * (Math.PI / 2);
                const speed = (0.5 + Math.random() * 4.5);
                this.targetVx = Math.cos(angle) * speed; 
                this.targetVy = Math.sin(angle) * speed;
                this.moveTimer = 1000 + Math.random() * 2000;
            }
            update(dt) {
                const dtMs = dt * 16.66;
                this.timer += dtMs;
                this.moveTimer -= dtMs;
                if (this.timer >= this.duration || !enabledEffects[this.effectIndex]) this.reset();
                else if (this.moveTimer <= 0) this.changeMovement();
                const inertiaEase = 1 - Math.pow(0.96, dt); 
                this.vx += (this.targetVx - this.vx) * inertiaEase;
                this.vy += (this.targetVy - this.vy) * inertiaEase;
                this.x += this.vx * dt; this.y += this.vy * dt;
                this.rotation += 0.015 * dt;
                if (this.x < 0) this.x += width; else if (this.x >= width) this.x -= width;
                if (this.y < 0) this.y += height; else if (this.y >= height) this.y -= height;
            }
            applyForce(p, dt) {
                if (!enabledEffects[this.effectIndex]) return;
                let dx = p.x - this.x; let dy = p.y - this.y;
                if (dx > width / 2) dx -= width; else if (dx < -width / 2) dx += width;
                if (dy > height / 2) dy -= height; else if (dy < -height / 2) dy += height;
                const hw = this.sizeW / 2; const hh = this.sizeH / 2;
                if (Math.abs(dx) < hw && Math.abs(dy) < hh) {
                    const normX = dx / hw; const normY = dy / hh;
                    const t = Math.max(Math.abs(normX), Math.abs(normY));
                    const inverseT = Math.max(0, 1 - t);
                    const edgeForce = config.hardEdges ? (inverseT > 0.02 ? 1 : 0) : (inverseT * inverseT * (3 - 2 * inverseT));
                    const userMult = (effectStrengths[this.effectIndex] / 100);
                    const s = this.strengthBase * edgeForce * dt * userMult;
                    const angle = Math.atan2(dy, dx); const dist = Math.sqrt(dx*dx + dy*dy);
                    switch(this.effectIndex) {
                        case 0: const lz = Math.sin(this.rotation)*10+20; p.vx += (10*(normY*10-normX*10))*s*0.05; p.vy += (normX*10*(28-lz)-normY*10)*s*0.05; break;
                        case 1: p.vx += Math.cos(angle+1.5+this.rotation)*s*4; p.vy += Math.sin(angle+1.5+this.rotation)*s*4; break;
                        case 2: p.vx += Math.sin(p.y*0.01+this.rotation*5)*s*6; break;
                        case 3: p.vx += Math.cos(angle)*Math.sin(dist*0.1-this.rotation*10)*s*3; p.vy += Math.sin(angle)*Math.sin(dist*0.1-this.rotation*10)*s*3; break;
                        case 4: p.vx += (Math.round(p.x/30)*30-p.x)*s*0.4; p.vy += (Math.round(p.y/25)*25-p.y)*s*0.4; break;
                        case 5: p.vx += Math.cos((Math.abs(p.x%40-20)+Math.abs(p.y%40-20)))*s*2; p.vy += Math.sin((Math.abs(p.x%40-20)+Math.abs(p.y%40-20)))*s*2; break;
                        case 6: p.vx += Math.cos(angle+1.57)*s*4; p.vy += Math.sin(angle+1.57)*s*4; break;
                        case 7: p.vx += Math.cos(angle)*s*5; p.vy += Math.sin(angle)*s*5; break;
                        case 8: p.vx -= Math.cos(angle)*s*4; p.vy -= Math.sin(angle)*s*4; break;
                        case 9: p.vx += (normY>0?1:-1)*s*5; break;
                        case 10: if (Math.abs(Math.sin((angle+this.rotation)*8))>0.7){ p.vx += Math.cos(angle+1.57)*s*4; p.vy += Math.sin(angle+1.57)*s*4; } break;
                        case 11: p.vx += Math.sin(this.rotation)*s*5; p.vy += Math.cos(this.rotation)*s*5; break;
                        case 12: p.vy += Math.cos(p.x*0.02+this.rotation*3)*s*5; break;
                        case 13: p.vx += Math.cos(angle+1.57)*Math.sin(dist*0.15-this.rotation*4)*s*5; p.vy += Math.sin(angle+1.57)*Math.sin(dist*0.15-this.rotation*4)*s*5; break;
                        case 14: p.vx += Math.sign(Math.sin(p.y*0.1))*s*3; break;
                        case 15: if (dist < hw/2) { p.vx += Math.cos(angle)*s*8; p.vy += Math.sin(angle)*s*8; } break;
                        case 16: p.vx += (Math.random()-0.5)*s*10; p.vy += (Math.random()-0.5)*s*10; break;
                        case 17: p.vx += Math.cos(angle)*(1+s*3); p.vy += Math.sin(angle)*(1+s*3); break;
                        case 18: p.vx -= (normX*5)*s; break;
                        case 19: p.vx += (Math.round(p.x/75)*75-p.x)*s*0.6; p.vy += (Math.round(p.y/75)*75-p.y)*s*0.6; break;
                        case 20: p.vx += Math.sin(p.y*0.05+this.rotation*0.5)*s*3; p.vy += Math.sin(p.x*0.05-this.rotation*0.5)*s*3; break;
                        case 21: if (Math.sin(p.x*0.1)*Math.sin(p.y*0.1)>0) p.vx += 2*s; break;
                        case 22: p.vx += Math.cos(angle)*Math.sin(this.rotation*4)*5*s; p.vy += Math.sin(angle)*Math.sin(this.rotation*4)*5*s; break;
                        case 23: p.vx += Math.tan(normX*0.5)*s*2; p.vy += Math.cos(normY*3)*s*3; break;
                        case 24: p.vx += Math.sin(p.y*0.05+this.rotation*2)*s*5; break;
                        case 25: p.vx += Math.cos(p.x*0.01+p.y*0.01+this.rotation)*s*4; p.vy += Math.sin(p.x*0.01-p.y*0.01+this.rotation)*s*4; break;
                        case 26: p.vx += Math.cos(angle+1.57)*(Math.floor(dist/20)%2==0?1:-1)*s*4; p.vy += Math.sin(angle+1.57)*(Math.floor(dist/20)%2==0?1:-1)*s*4; break;
                        case 27: p.vx += dx*0.05*s; p.vy += dy*0.05*s; break;
                        case 28: p.vy -= 2*s; break;
                        case 29: p.vx += ((Math.floor(p.x/20)+Math.floor(p.y/20))%2==0?1:-1)*s*4; break;
                        case 30: p.vx += (Math.round(dx/25)*25-dx)*s*0.5; p.vy += (Math.round(dy/25)*25-dy)*s*0.5; break;
                        case 31: p.vx += (Math.round(p.x/15)*15-p.x)*s*0.8; p.vy += (Math.round(p.y/15)*15-p.y)*s*0.8; break;
                        case 32: p.vx += (Math.round(p.x/12)*12-p.x)*s*0.9; break;
                        case 33: p.vx += ((p.x+p.y)%30<(p.x-p.y)%30?1:-1)*s*2; break;
                        case 34: p.vx += (Math.round(p.x/100)*100-p.x)*s*0.3; p.vy += (Math.round(p.y/60)*60-p.y)*s*0.3; break;
                        case 35: const spA = Math.round(angle*4)/4; p.vx += (Math.cos(spA)*dist-dx)*s*0.4; p.vy += (Math.sin(spA)*dist-dy)*s*0.4; break;
                        case 36: p.vx += (Math.floor(p.x/40)*40+(p.y%40)-p.x)*s*0.5; break;
                        case 37: const sdA = angle+dist*0.033; p.vx += (Math.cos(Math.round(sdA*10)/10)*dist-dx)*s*0.4; p.vy += (Math.sin(Math.round(sdA*10)/10)*dist-dy)*s*0.4; break;
                        case 38: p.vx += ((Math.floor(p.x/30)+Math.floor(p.y/30))%2==0?1:-1)*s*3; break;
                        case 39: const dSu = Math.round((p.x+p.y)/25)*25; const dDi = Math.round((p.x-p.y)/25)*25; p.vx += ((dSu+dDi)/2-p.x)*s*0.7; p.vy += ((dSu-dDi)/2-p.y)*s*0.7; break;
                        case 40: const gld = Math.PI*(3-Math.sqrt(5)); const fAng = Math.round(dist*0.1)*gld+this.rotation; p.vx += (this.x+Math.cos(fAng)*dist-p.x)*s*0.125; p.vy += (this.y+Math.sin(fAng)*dist-p.y)*s*0.125; break;
                        case 41: const mx_0 = normX*1.5-0.5; const my_0 = normY*1.5; let mx=0, my=0, mi=0; while(mx*mx+my*my<=4 && mi < 8){ const xt=mx*mx-my*my+mx_0; my=2*mx*my+my_0; mx=xt; mi++; } if(mi < 8){ p.vx += Math.cos(angle) * s * 6; p.vy += Math.sin(angle) * s * 6;} break;
                        case 42: p.vx += (Math.floor(p.x/40)*40+20-p.x)*s*0.6; p.vy += (Math.floor(p.y/40)*40+20-p.y)*s*0.6; break;
                        case 43: p.vx += (Math.floor(normX*8+8)+Math.floor(normY*8+8))%2==0?Math.sin(this.rotation)*s*5:-Math.sin(this.rotation)*s*5; p.vy += (Math.floor(normX*8+8)+Math.floor(normY*8+8))%2==0?Math.cos(this.rotation)*s*5:-Math.cos(this.rotation)*s*5; break;
                        case 44: const tAng = Math.atan2(p.y-height, p.x-width/2); p.vx += Math.cos(tAng)*s*4; p.vy += Math.sin(tAng)*s*4; break;
                        case 45: const ix = Math.round((p.x-p.y)/1.73/30)*30*1.73; const iy = Math.round((p.x+p.y)/30)*30; p.vx += (ix+iy/2-p.x)*s*0.35; p.vy += (iy/2-p.y)*s*0.35; break;
                        case 46: if(Math.abs(angle-(this.rotation*2)%(Math.PI*2))<0.1 || Math.abs(angle-(this.rotation*2)%(Math.PI*2))>Math.PI*2-0.1){ p.vx += Math.cos(angle)*s*6; p.vy += Math.sin(angle)*s*6; } break;
                        case 47: const cxS = Math.round(p.x/20)*20; const cyS = Math.round(p.y/20)*20; if(Math.abs(cxS-p.x)<Math.abs(cyS-p.y)) p.vx += (cxS-p.x)*s*0.9; else p.vy += (cyS-p.y)*s*0.9; break;
                        case 48: if(p.x%45<5) p.vy += Math.sin(p.x*0.01)*s*4; if(p.y%45<5) p.vx += Math.cos(p.y*0.01)*s*4; break;
                        case 49: const sdTX = Math.floor(this.x/50)*50+Math.cos(this.id)*hw; const sdTY = Math.floor(this.y/50)*50+Math.sin(this.id)*hh; p.vx += (sdTX-p.x)*s*0.048; p.vy += (sdTY-p.y)*s*0.048; break;
                        case 50: p.vx += ((Math.floor(p.x/25)+Math.floor(p.y/25))%2==0?1:-1)*s*3; p.vy += -((Math.floor(p.x/25)+Math.floor(p.y/25))%2==0?1:-1)*s*3; break;
                        case 51: p.vx += Math.cos(angle)*((p.luma/255)*6*s-3); p.vy += Math.sin(angle)*((p.luma/255)*6*s-3); break;
                        case 52: if (p.r > p.g && p.r > p.b) p.vx -= s * 5; else if (p.g > p.r && p.g > p.b) p.vy -= s * 5; else p.vx += s * 5; break;
                        case 53: const sAngV = (Math.max(p.r,p.g,p.b)-Math.min(p.r,p.g,p.b)/255)*Math.PI*2+this.rotation; p.vx += Math.cos(sAngV)*s*5; p.vy += Math.sin(sAngV)*s*5; break;
                        case 54: p.vx += Math.cos(angle)*(p.r > p.b ? 1 : -1)*s*6; p.vy += Math.sin(angle)*(p.r > p.b ? 1 : -1)*s*6; break;
                        case 55: p.vx += (p.g > 150 ? Math.sin(p.y*0.1)*s*5 : -Math.sin(p.y*0.1)*s*5); break;
                        case 56: p.vx += (Math.round(p.x/40)*40-p.x)*(p.r/255)*s*3.2; break;
                        case 57: p.vx += Math.cos(angle+1.57)*(Math.floor(p.luma/50)%2==0?1:-1)*s*5; p.vy += Math.sin(angle+1.57)*(Math.floor(p.luma/50)%2==0?1:-1)*s*5; break;
                        case 58: p.vx += Math.cos(angle)*(1-p.luma/255)*s*7; p.vy += Math.sin(angle)*(1-p.luma/255)*s*7; break;
                        case 59: p.vx += ((p.r+p.g)/2 > p.b ? 1 : -1)*s*5; break;
                        case 60: const lStp = height / 6; p.vy += (lStp * Math.floor(p.luma / 42.5) + lStp/2 - ((p.y - this.y + height/2) % height)) * s * 0.1; break;
                        case 61: if(p.r > p.g && p.r > p.b) { p.vx += (-hw - dx)*s*0.05; p.vy += (-hh - dy)*s*0.05; } 
                            else if(p.g > p.r && p.g > p.b) { p.vx += (hw - dx)*s*0.05; p.vy += (-hh - dy)*s*0.05; }
                            else if(p.b > p.r && p.b > p.g) { p.vx += (-hw - dx)*s*0.05; p.vy += (hh - dy)*s*0.05; } break;
                        case 62: const sDv = (Math.max(p.r,p.g,p.b)-Math.min(p.r,p.g,p.b) > 100 ? 1 : -1); p.vx += Math.cos(angle)*sDv*s*1.5; p.vy += Math.sin(angle)*sDv*s*1.5; break;
                        case 63: const hAngM = (p.phase / 360) * Math.PI * 2 + this.rotation; p.vx += (Math.cos(hAngM)*dist - dx)*s*0.3; p.vy += (Math.sin(hAngM)*dist - dy) * s * 0.3; break;
                        case 64: let pRotS = p.r > 200 ? 0.05 : (p.g > 200 ? -0.05 : 0.02); p.vx += Math.cos(angle + 1.57)*dist*pRotS*s; p.vy += Math.sin(angle + 1.57)*dist*pRotS*s; break;
                        case 65: p.vx += Math.cos(angle)*(p.luma/255 > 0.5 ? -1 : 1)*s*1.25; p.vy += Math.sin(angle)*(p.luma/255 > 0.5 ? -1 : 1)*s*1.25; break;
                        case 66: if(p.r < 100) p.vx -= s*5; else if(p.g < 100) p.vy -= s*5; else if(p.b < 100) p.vx += s*5; break;
                        case 67: p.vx += Math.cos(angle)*Math.sin(dist*0.1 - this.rotation*(p.luma/50))*s*1; p.vy += Math.sin(angle)*Math.sin(dist*0.1 - this.rotation*(p.luma/50))*s*1; break;
                        case 68: const cgOfs = (p.phase/360)*20; p.vx += (Math.round((p.x + cgOfs)/30)*30 - cgOfs - p.x)*s*0.6; break;
                    }
                }
            }
        }

        function buildMenu() {
            const catOrganic = document.getElementById('cat-organic');
            const catFluid = document.getElementById('cat-fluid');
            const catChroma = document.getElementById('cat-chroma');
            catOrganic.innerHTML = ''; catFluid.innerHTML = ''; catChroma.innerHTML = '';

            EFFECT_NAMES.forEach((name, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'effect-item-wrapper';
                const topRow = document.createElement('div');
                topRow.className = 'effect-row-top';
                const label = document.createElement('span');
                label.className = 'effect-name' + (enabledEffects[idx] ? ' active-text' : '');
                label.innerText = name;
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = enabledEffects[idx];
                checkbox.onchange = (e) => {
                    enabledEffects[idx] = e.target.checked;
                    label.classList.toggle('active-text', enabledEffects[idx]);
                    saveState();
                };
                topRow.appendChild(label);
                topRow.appendChild(checkbox);
                const strengthContainer = document.createElement('div');
                const slider = document.createElement('input');
                slider.type = 'range'; slider.min = '0'; slider.max = '200'; slider.value = effectStrengths[idx];
                const sLabel = document.createElement('div');
                sLabel.className = 'strength-label';
                sLabel.innerHTML = `<span>POWER</span><span>${effectStrengths[idx]}%</span>`;
                slider.oninput = (e) => {
                    effectStrengths[idx] = parseInt(e.target.value);
                    sLabel.innerHTML = `<span>POWER</span><span>${effectStrengths[idx]}%</span>`;
                };
                slider.onchange = () => saveState();
                strengthContainer.appendChild(slider);
                strengthContainer.appendChild(sLabel);
                wrapper.appendChild(topRow);
                wrapper.appendChild(strengthContainer);
                if (name.includes('[O]')) catOrganic.appendChild(wrapper);
                else if (name.includes('[C]')) catChroma.appendChild(wrapper);
                else catFluid.appendChild(wrapper);
            });

            const pList = document.getElementById('palette-list');
            pList.innerHTML = '';
            const allPals = [...Object.keys(CYCLIC_PALETTES), ...Object.keys(STATIC_PALETTES)];
            allPals.forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'btn' + (config.palette === key ? ' active' : '');
                btn.innerText = key.includes('cycle') ? `[ ${key.split('_')[1].toUpperCase()} ]` : key.charAt(0).toUpperCase() + key.slice(1);
                btn.onclick = () => {
                    document.querySelectorAll('#palette-list .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    config.palette = key;
                    particles.forEach(p => p.assignColor());
                    saveState();
                };
                pList.appendChild(btn);
            });
        }

        function resize() {
            width = canvas.width = Math.floor(window.innerWidth);
            height = canvas.height = Math.floor(window.innerHeight);
            let coverageRatio = config.grainSize === 2 ? 0.15 : (config.grainSize === 3 ? 0.20 : 0.10);
            particleCount = Math.min(MAX_PARTICLES, Math.floor((width * height * coverageRatio) / (config.grainSize * config.grainSize))); 
            if (particles.length > particleCount) particles.length = particleCount;
            else while (particles.length < particleCount) particles.push(new Particle());
            cells = [];
            for (let i = 0; i < CELL_COUNT; i++) cells.push(new Cell(i));
        }

        function loop(timestamp) {
            if (!width || !height) return requestAnimationFrame(loop);
            const dt = Math.min(2.0, (timestamp - lastFrameTime) / 16.66); 
            lastFrameTime = timestamp;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.fillRect(0, 0, width, height);
            cells.forEach(cell => cell.update(dt));
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const gs = config.grainSize;

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                for (let j = 0; j < cells.length; j++) cells[j].applyForce(p, dt);
                p.update(dt);
                let lumaFactor = config.velocityLuma ? Math.min(1.0, Math.sqrt(p.vx * p.vx + p.vy * p.vy) / 12.0) : 1.0;
                const px = Math.floor(p.x); const py = Math.floor(p.y);
                for (let gy = 0; gy < gs; gy++) {
                    const py_off = py + gy;
                    if (py_off < 0 || py_off >= height) continue;
                    for (let gx = 0; gx < gs; gx++) {
                        const px_off = px + gx;
                        if (px_off < 0 || px_off >= width) continue;
                        const idx = (py_off * width + px_off) * 4;
                        data[idx] = p.r * lumaFactor; data[idx+1] = p.g * lumaFactor; data[idx+2] = p.b * lumaFactor; data[idx+3] = 255;
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
            requestAnimationFrame(loop);
        }

        document.getElementById('btn-soft').onclick = () => { config.hardEdges = false; document.getElementById('btn-soft').classList.add('active'); document.getElementById('btn-hard').classList.remove('active'); saveState(); };
        document.getElementById('btn-hard').onclick = () => { config.hardEdges = true; document.getElementById('btn-hard').classList.add('active'); document.getElementById('btn-soft').classList.remove('active'); saveState(); };
        document.getElementById('btn-velocity-luma').onclick = (e) => { config.velocityLuma = !config.velocityLuma; e.target.classList.toggle('active', config.velocityLuma); saveState(); };
        canvas.onclick = (e) => { if (e.target === canvas) { menu.classList.add('active'); buildMenu(); } };
        document.getElementById('close-menu').onclick = () => menu.classList.remove('active');
        document.getElementById('toggle-all').onclick = () => {
            const target = !enabledEffects.some(e => e); enabledEffects.fill(target); buildMenu(); saveState();
        };

        document.getElementById('randomise').onclick = () => {
            enabledEffects.fill(false);
            const org = EFFECT_NAMES.map((n, i) => n.includes('[O]') ? i : -1).filter(i => i !== -1);
            const dyn = EFFECT_NAMES.map((n, i) => !n.includes('[O]') && !n.includes('[C]') ? i : -1).filter(i => i !== -1);
            const chr = EFFECT_NAMES.map((n, i) => n.includes('[C]') ? i : -1).filter(i => i !== -1);
            const sel = new Set();
            sel.add(chr[Math.floor(Math.random() * chr.length)]);
            const nOrg = Math.random() < 0.5 ? 3 : 4;
            const shuf = (a) => a.sort(() => Math.random() - 0.5);
            shuf(org); for(let i=0; i<nOrg; i++) sel.add(org[i]);
            shuf(dyn); let di=0; while(sel.size<8 && di<dyn.length) sel.add(dyn[di++]);
            sel.forEach(idx => enabledEffects[idx] = true);
            if (Math.random() < 0.05) config.palette = Object.keys(CYCLIC_PALETTES)[Math.floor(Math.random() * Object.keys(CYCLIC_PALETTES).length)];
            else config.palette = Object.keys(STATIC_PALETTES)[Math.floor(Math.random() * Object.keys(STATIC_PALETTES).length)];
            config.grainSize = [1, 2, 3][Math.floor(Math.random() * 3)];
            resize(); 
            particles.forEach(p => p.assignColor());
            buildMenu();
            saveState();
        };

        window.onresize = resize;
        resize(); // Immediate initialization
        requestAnimationFrame(loop);
    </script>
</body>
</html>
