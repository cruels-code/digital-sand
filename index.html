<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTROPY ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffffff; --bg: #000; --panel-bg: #050505; --border: #333; --text-muted: #888; }
        body { margin: 0; overflow: hidden; background-color: var(--bg); display: flex; justify-content: center; align-items: center; font-family: 'Pixelify Sans', sans-serif; color: var(--accent); user-select: none; }
        canvas { display: block; touch-action: none; cursor: crosshair; opacity: 0; transition: opacity 1s ease, filter 0.3s ease; }
        
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.15); display: none; flex-direction: column; align-items: center; padding: 20px; z-index: 100; overflow-y: auto; border: 2px solid var(--border); }
        #menu-overlay.active { display: flex; }
        
        .terminal-header { width: 100%; max-width: 900px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; box-sizing: border-box; flex-shrink: 0; }
        .terminal-header h2 { margin: 0; font-size: 16px; opacity: 0.6; letter-spacing: 1px; }
        
        .settings-panel { background: var(--panel-bg); padding: 12px; border: 1px solid var(--border); margin-bottom: 15px; width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; flex-shrink: 0; }
        .setting-group { display: flex; flex-direction: column; gap: 6px; }
        .setting-label { font-size: 12px; color: var(--accent); opacity: 0.5; text-transform: uppercase; }
        
        .controls { background: var(--panel-bg); padding: 12px; border: 1px solid var(--border); display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 900px; box-sizing: border-box; flex-shrink: 0; }
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; cursor: pointer; font-family: 'Pixelify Sans', sans-serif; font-size: 12px; transition: all 0.1s; text-transform: uppercase; }
        .btn:hover, .btn.active { background: var(--accent); color: var(--bg); }
        
        details { width: 100%; max-width: 900px; border: 1px solid #1a1a1a; margin-bottom: 4px; background: #080808; box-sizing: border-box; flex-shrink: 0; }
        summary { padding: 8px; cursor: pointer; font-size: 14px; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        details[open] summary { border-bottom: 1px solid var(--border); color: #fff; }
        
        .group-header { padding: 10px 10px 0 10px; display: flex; justify-content: flex-end; }
        
        .effect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; padding: 10px; }
        .effect-card { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .effect-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .effect-name { font-size: 11px; color: var(--text-muted); }
        .active-text { color: var(--accent) !important; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: #1a1a1a; outline: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border: 1px solid var(--bg); }
        .strength-label { font-size: 10px; color: #333; display: flex; justify-content: space-between; }
        
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; width: 100%; }
        .palette-grid .btn { font-size: 10px; padding: 4px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #save-indicator { position: fixed; bottom: 10px; right: 10px; font-size: 12px; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
        #fps-counter { position: fixed; top: 15px; left: 15px; font-size: 14px; color: var(--accent); font-family: 'Pixelify Sans', monospace; z-index: 200; display: none; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="save-indicator">>> SYNC_SUCCESS</div>
    <div id="fps-counter">FPS: 00</div>

    <div id="menu-overlay">
        <div class="terminal-header"><h2>ENTROPY ENGINE</h2></div>

        <div class="settings-panel">
            <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end;">
                <div class="setting-group">
                    <span class="setting-label">FIELD_FALLOFF</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn" id="btn-soft">[ SOFT ]</button>
                        <button class="btn" id="btn-hard">[ HARD ]</button>
                    </div>
                </div>
                <div class="setting-group">
                    <span class="setting-label">BRIGHTNESS</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn" id="btn-velocity-luma">[ VELOCITY_MAP ]</button>
                    </div>
                </div>
                <div class="setting-group">
                    <span class="setting-label">ANTI-CLUMP</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn" id="btn-respawn">[ STOCHASTIC_RESPAWN ]</button>
                    </div>
                </div>
                <div class="setting-group">
                    <span class="setting-label">RESOLUTION</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn" id="btn-res-1">[ 1x1 ]</button>
                        <button class="btn" id="btn-res-2">[ 2x2 ]</button>
                    </div>
                </div>
                <div class="setting-group" style="flex-grow: 1; min-width: 150px;">
                    <div class="strength-label" style="margin-bottom: 5px;">
                        <span class="setting-label">MAX_SPEED</span>
                        <span id="label-max-speed" style="font-size: 12px; color: var(--accent);">5</span>
                    </div>
                    <input type="range" id="slider-max-speed" min="2" max="40" value="5">
                </div>
            </div>
            <div class="setting-group">
                <span class="setting-label">COLOR_MAP (5-COL_GRID)</span>
                <div class="palette-grid" id="palette-list"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="toggle-all">[ Toggle_All ]</button>
            <button class="btn" id="randomise">[ RANDOMISE ]</button>
            <button class="btn" id="btn-analysis">[ ANALYSIS ]</button>
            <button class="btn" id="reset-settings">[ RESET ]</button>
            <button class="btn" id="close-menu">[ RESUME ]</button>
        </div>
        
        <details>
            <summary><span>[ SPREADERS ]</span><span>+</span></summary>
            <div class="group-header"><button class="btn btn-group-toggle" data-type="[S]">[ Toggle_Group ]</button></div>
            <div class="effect-grid" id="cat-spreader"></div>
        </details>
        <details>
            <summary><span>[ 3D SPACE ]</span><span>+</span></summary>
            <div class="group-header"><button class="btn btn-group-toggle" data-type="[3D]">[ Toggle_Group ]</button></div>
            <div class="effect-grid" id="cat-3d"></div>
        </details>
        <details>
            <summary><span>[ CYMATICS ]</span><span>+</span></summary>
            <div class="group-header"><button class="btn btn-group-toggle" data-type="[A]">[ Toggle_Group ]</button></div>
            <div class="effect-grid" id="cat-cymatics"></div>
        </details>
        <details>
            <summary><span>[ ORGANIC ]</span><span>+</span></summary>
            <div class="group-header"><button class="btn btn-group-toggle" data-type="[O]">[ Toggle_Group ]</button></div>
            <div class="effect-grid" id="cat-organic"></div>
        </details>
        <details>
            <summary><span>[ FLUID ]</span><span>+</span></summary>
            <div class="group-header"><button class="btn btn-group-toggle" data-type="default">[ Toggle_Group ]</button></div>
            <div class="effect-grid" id="cat-fluid"></div>
        </details>
        <details>
            <summary><span>[ CHROMA ]</span><span>+</span></summary>
            <div class="group-header"><button class="btn btn-group-toggle" data-type="[C]">[ Toggle_Group ]</button></div>
            <div class="effect-grid" id="cat-chroma"></div>
        </details>
        <div style="flex-shrink: 0; min-height: 400px; width: 100%;"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // 1. CONSTANTS & CONFIGURATION
        // ==========================================
        const CONSTANTS = {
            BASE_CELL_COUNT: 3,
            VELOCITY_CELL_COUNT: 11,
            FRICTION: 0.94,
            LUMA_DECAY: 0.988, 
            BASE_SPEED: 0.5,
            MAX_PARTICLES: 315000,
            COVERAGE_RATIO: 0.2625,
            MS_PER_FRAME: 16.66
        };

        const EFFECTS = [
            // --- FLUID EFFECTS (Indices 0 to 26) ---
            "Bubble Repulsion", "Chaos Mix", "Concentric Spin", "Convergence", "Cross Wind", "Divergence", 
            "DNA Spiral", "Expansion Pulse", "Galaxy Spiral", "Lorenz Attractor", "Magnetic North", "Maze Runner", 
            "Mirror Center", "Orbitals", "Perlin Drift", "Radial Comb", "Ripples", "Shear", "Sine Sieve", 
            "Square Wave", "Tangent Twist", "Turbulent Flow", "Vertical Gusts", "Vortex", "Warp Drive", 
            "Wind Gusts", "Zoom Out",

            // --- ORGANIC EFFECTS (Indices 27 to 59) ---
            "Binary Tree [O]", "Celtic Knots [O]", "Checkerboard Push [O]", "Chevron Tiling [O]", "Circuit Board [O]", 
            "Concentric Squares [O]", "Crystallize [O]", "Diagonal Crosshatch [O]", "Diamond Dot Array [O]", "Diamond Lattice [O]", 
            "Dotted Grid [O]", "Dotted Spirals [O]", "Dragon Curve Fold [O]", "Fibonacci Spiral [O]", "Gosper Hex Flow [O]", 
            "Hex Grid [O]", "Hexagonal Rings [O]", "Hilbert Curve [O]", "Honeycomb [O]", "Isometric Cube [O]", 
            "Moore Loop Fold [O]", "Octagon Grid [O]", "Peano Grid Sweep [O]", "Radar Sweep [O]", "Radial Spokes [O]", 
            "Serendipity Dots [O]", "Sierpinski Repulsion [O]", "Tartan Plaid [O]", "Triangle Tessellation [O]", "Vertical Pinstripes [O]", 
            "Voronoi Cells [O]", "Weave Lattice [O]", "Ziggurat [O]",

            // --- CHROMA EFFECTS (Indices 60 to 64) ---
            "Chromatic Wave [C]", "Color Gradient Snap [C]", "Color Grid Snap [C]", "Green Channel Sieve [C]", "Intensity Well [C]",
            
            // --- SPREADER EFFECTS (Indices 65 to 68) ---
            "Concentric Repel [S]", "Noise Expulsion [S]", "Wave Diffuser [S]", "ZigZag Scatter [S]", 

            // --- 3D EFFECTS (Indices 69 to 77) ---
            "Double Helix 3D [3D]", "Hyperbolic Funnel [3D]", "Mobius Strip [3D]", "Perspective Tunnel [3D]", "Ripple Plane 3D [3D]", 
            "Rotating 3D Grid [3D]", "Rotating Cube Edges [3D]", "Torus Parametric [3D]", "Wireframe Sphere [3D]",

            // --- CYMATICS EFFECTS (Indices 78 to 80) ---
            "Harmonic Resonance [A]", "Low-Frequency Hum [A]", "Sawtooth Vibration [A]"
        ];

        const DEFAULT_STRENGTHS = [
            // FLUID (0-26)
            100, 200, 164, 100, 100, 7,
            56, 23, 28, 100, 51, 200,
            200, 100, 123, 100, 200, 100, 9,
            100, 24, 8, 100, 200, 5,
            200, 200,

            // ORGANIC (27-59)
            200, 200, 188, 200, 198, 
            41, 18, 200, 200, 199, 
            200, 9, 191, 124, 181, 
            114, 200, 200, 89, 9, 
            16, 200, 180, 200, 200, 
            118, 200, 200, 200, 200, 
            1, 200, 200,

            // CHROMA (60-64)
            200, 200, 200, 44, 32,

            // SPREADERS (65-68)
            200, 200, 200, 200,

            // 3D (69-77)
            200, 200, 200, 200, 200, 
            200, 200, 200, 200,

            // CYMATICS (78-80)
            200, 200, 200
        ];

        const DEFAULT_ENABLED = new Array(EFFECTS.length).fill(true);

        const PALETTE_DEFS = {
            cyclic: {
                rainbow_hdr: [{r:255,g:0,b:0},{r:255,g:255,b:0},{r:0,g:255,b:0},{r:0,g:255,b:255},{r:0,g:0,b:255},{r:255,g:0,b:255}],
                strobe_hdr: [{r:0,g:0,b:0},{r:85,g:85,b:85},{r:170,g:170,b:170},{r:255,g:255,b:255}],
                toxic: [{r:173,g:255,b:47},{r:255,g:255,b:0},{r:50,g:205,b:50}],
                abyss: [{r:0,g:10,b:30},{r:0,g:255,b:255},{r:0,g:100,b:150}],
                glitch: [{r:255,g:0,b:255},{r:0,g:255,b:255},{r:255,g:255,b:255}],
                volcano: [{r:40,g:0,b:0},{r:255,g:69,b:0},{r:255,g:215,b:0}],
                nebula: [{r:75,g:0,b:130},{r:199,g:21,b:133},{r:0,g:0,b:139}],
                gold: [{r:101,g:67,b:33},{r:255,g:215,b:0},{r:255,g:255,b:200}],
                ghost: [{r:255,g:255,b:255},{r:176,g:196,b:222},{r:72,g:61,b:139}],
                plasma: [{r:148,g:0,b:211},{r:75,g:0,b:130},{r:255,g:0,b:255}],
                seafoam: [{r:64,g:224,b:208},{r:127,g:255,b:212},{r:0,g:128,b:128}]
            },
            static: {
                spectrum: [{r:255,g:0,b:0},{r:255,g:255,b:0},{r:0,g:255,b:0},{r:0,g:255,b:255},{r:0,g:0,b:255},{r:255,g:0,b:255}],
                neon: [{r:255,g:0,b:128},{r:0,g:255,b:255},{r:128,g:0,b:255},{r:255,g:255,b:255}],
                sunset: [{r:255,g:50,b:0},{r:255,g:200,b:0},{r:100,g:0,b:150},{r:255,g:255,b:200}],
                deepsea: [{r:0,g:20,b:50},{r:0,g:255,b:150},{r:0,g:100,b:255},{r:200,g:255,b:255}],
                matrix: [{r:0,g:40,b:0},{r:0,g:255,b:70},{r:20,g:100,b:20},{r:0,g:255,b:0}],
                cyber: [{r:255,g:0,b:255},{r:0,g:255,b:255},{r:255,g:255,b:0},{r:255,g:0,b:100}],
                magma: [{r:40,g:0,b:0},{r:255,g:0,b:0},{r:255,g:120,b:0},{r:255,g:255,b:0}],
                frost: [{r:0,g:50,b:100},{r:100,g:200,b:255},{r:200,g:255,b:255},{r:255,g:255,b:255}],
                vapor: [{r:255,g:113,b:206},{r:1,g:205,b:254},{r:5,g:255,b:161},{r:185,g:103,b:255},{r:255,g:251,b:150}],
                royal: [{r:75,g:0,b:130},{r:255,g:215,b:0},{r:139,g:0,b:139},{r:218,g:165,b:32}],
                autumn: [{r:139,g:69,b:19},{r:210,g:105,b:30},{r:255,g:140,b:0},{r:255,g:69,b:0}],
                toxic: [{r:173,g:255,b:47},{r:148,g:0,b:211},{r:50,g:205,b:50},{r:139,g:0,b:139}],
                berry: [{r:0,g:0,b:139},{r:220,g:20,b:60},{r:199,g:21,b:133},{r:75,g:0,b:130}],
                midnight: [{r:25,g:25,b:112},{r:0,g:0,b:205},{r:72,g:61,b:139},{r:176,g:196,b:222}],
                coral: [{r:255,g:127,b:80},{r:64,g:224,b:208},{r:255,g:99,b:71},{r:127,g:255,b:212}],
                synth: [{r:36,g:0,b:70},{r:90,g:24,b:154},{r:157,g:78,b:221},{r:255,g:0,b:110}],
                monochrome: [{r:255,g:255,b:255},{r:255,g:255,b:255}],
                monogold: [{r:101,g:67,b:33},{r:255,g:215,b:0},{r:218,g:165,b:32},{r:255,g:255,b:150}]
            }
        };

        // ==========================================
        // 2. STATE MANAGEMENT
        // ==========================================
        const AppState = {
            width: window.innerWidth,
            height: window.innerHeight,
            particleData: null,
            particleCount: 0,
            cells: [],
            lastFrameTime: performance.now(),
            config: { hardEdges: false, velocityLuma: false, palette: 'cycle_rainbow_hdr', grainSize: 2, maxSpeed: 5, analysisMode: false, stochasticRespawning: true },
            enabledEffects: [...DEFAULT_ENABLED],
            effectStrengths: [...DEFAULT_STRENGTHS]
        };

        // ==========================================
        // 3. UTILITIES & PRE-COMPUTATION
        // ==========================================
        const $ = id => document.getElementById(id);
        const el = (tag, props = {}) => Object.assign(document.createElement(tag), props);
        const shuffle = arr => arr.sort(() => Math.random() - 0.5);

        const PALETTE_LUTS = {};
        const lerpColor = (c1, c2, t) => ({
            r: c1.r + (c2.r - c1.r) * t | 0,
            g: c1.g + (c2.g - c1.g) * t | 0,
            b: c1.b + (c2.b - c1.b) * t | 0
        });

        function buildLUTs() {
            const createLUT = (stops, isCyclic) => {
                const lut = new Uint32Array(360);
                for (let i = 0; i < 360; i++) {
                    const t = isCyclic ? (i / 360) * stops.length : (i / 359) * (stops.length - 1);
                    const idx1 = Math.floor(t) % stops.length;
                    const idx2 = isCyclic ? (idx1 + 1) % stops.length : Math.min(idx1 + 1, stops.length - 1);
                    const c = lerpColor(stops[idx1], stops[idx2], t % 1);
                    lut[i] = (255 << 24) | (c.b << 16) | (c.g << 8) | c.r; 
                }
                return lut;
            };
            Object.entries(PALETTE_DEFS.cyclic).forEach(([k, stops]) => PALETTE_LUTS[`cycle_${k}`] = createLUT(stops, true));
            Object.entries(PALETTE_DEFS.static).forEach(([k, stops]) => PALETTE_LUTS[k] = createLUT(stops, false));
        }
        buildLUTs();

        function updateCanvasFilter() {
            if (AppState.config.palette === 'cycle_rainbow_hdr' || AppState.config.palette === 'cycle_strobe_hdr') {
                $('canvas').style.filter = 'saturate(1.5) contrast(1.2) brightness(1.2)';
            } else {
                $('canvas').style.filter = 'none';
            }
        }

        // ==========================================
        // 4. PERSISTENCE LAYER (Firebase + LocalStorage)
        // ==========================================
        const FIREBASE_CONFIG = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'standalone-sand-art';
        let db = null, user = null;

        if (FIREBASE_CONFIG) {
            const fApp = initializeApp(FIREBASE_CONFIG);
            const auth = getAuth(fApp);
            db = getFirestore(fApp);
            onAuthStateChanged(auth, u => { user = u; if (u) syncLoad(); });
            const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
            if (token) signInWithCustomToken(auth, token); else signInAnonymously(auth);
        } else {
            setTimeout(syncLoad, 50);
        }

        async function syncSave() {
            const data = { config: AppState.config, enabledEffects: AppState.enabledEffects, effectStrengths: AppState.effectStrengths, timestamp: Date.now() };
            try { localStorage.setItem('sand_art_state', JSON.stringify(data)); } catch(e) {}
            if (db && user) {
                try { await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'current'), data); } 
                catch (e) { console.warn("Cloud sync disabled."); }
            }
            const ind = $('save-indicator');
            if (ind) { ind.style.opacity = 1; setTimeout(() => ind.style.opacity = 0, 2000); }
        }

        async function syncLoad() {
            let data = null;
            if (db && user) {
                try {
                    const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'current'));
                    if (snap.exists()) data = snap.data();
                } catch(e) {}
            }
            if (!data) {
                try { const local = localStorage.getItem('sand_art_state'); if (local) data = JSON.parse(local); } catch(e) {}
            }
            if (data) {
                Object.assign(AppState.config, data.config);
                if (AppState.config.maxSpeed === undefined) AppState.config.maxSpeed = 5;
                if (AppState.config.analysisMode === undefined) AppState.config.analysisMode = false;
                if (AppState.config.stochasticRespawning === undefined) AppState.config.stochasticRespawning = true;
                if (AppState.config.palette === 'cycle_rainbow') AppState.config.palette = 'cycle_rainbow_hdr';
                if (AppState.config.palette === 'cycle_strobe') AppState.config.palette = 'cycle_strobe_hdr';
                
                if (data.enabledEffects) {
                    AppState.enabledEffects = data.enabledEffects;
                    while (AppState.enabledEffects.length < EFFECTS.length) AppState.enabledEffects.push(true);
                }
                if (data.effectStrengths) {
                    AppState.effectStrengths = data.effectStrengths;
                    while (AppState.effectStrengths.length < DEFAULT_STRENGTHS.length) {
                        AppState.effectStrengths.push(DEFAULT_STRENGTHS[AppState.effectStrengths.length]);
                    }
                }
            }
            updateUIToggles();
            updateCanvasFilter();
            resizeEngine();
            buildMenuDOM();
            
            // Fade in canvas on first load
            setTimeout(() => {
                const cvs = document.getElementById('canvas');
                if (cvs) cvs.style.opacity = '1';
            }, 50);
        }

        // ==========================================
        // 5. UI & DOM MANAGEMENT
        // ==========================================
        const canvas = $('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const menu = $('menu-overlay');

        function updateUIToggles() {
            $('btn-soft').classList.toggle('active', !AppState.config.hardEdges);
            $('btn-hard').classList.toggle('active', AppState.config.hardEdges);
            $('btn-velocity-luma').classList.toggle('active', AppState.config.velocityLuma);
            $('btn-respawn').classList.toggle('active', AppState.config.stochasticRespawning);
            $('btn-res-1').classList.toggle('active', AppState.config.grainSize === 1);
            $('btn-res-2').classList.toggle('active', AppState.config.grainSize === 2);
            $('btn-analysis').classList.toggle('active', AppState.config.analysisMode);
            $('slider-max-speed').value = AppState.config.maxSpeed;
            $('label-max-speed').innerText = AppState.config.maxSpeed;
        }

        function buildMenuDOM() {

        // ==========================================
        // 6. PHYSICS & SIMULATION ENGINE
        // ==========================================
        class Cell {
            constructor(id, isSpreader = false) {
                this.id = id; 
                this.isSpreader = isSpreader;
                this.x = Math.random() * AppState.width; 
                this.y = Math.random() * AppState.height;
                this.vx = 0; this.vy = 0; this.targetVx = 0; this.targetVy = 0;
                this.moveTimer = 0; this.reset();
            }
            reset() {
                if (this.isSpreader) {
                    const scale = 0.525 + Math.random() * 0.525; 
                    this.sizeW = this.sizeH = Math.min(AppState.width, AppState.height) * scale;
                    
                    const enabledSpreaders = [];
                    for (let i = 65; i <= 68; i++) if (AppState.enabledEffects[i]) enabledSpreaders.push(i);
                    
                    if (enabledSpreaders.length > 0) {
                        this.effectIndex = enabledSpreaders[Math.floor(Math.random() * enabledSpreaders.length)];
                    } else {
                        this.effectIndex = 65 + Math.floor(Math.random() * 4);
                    }
                    
                    this.timer = 0; 
                    this.duration = 6000 + Math.random() * 4000;
                    this.rotation = 0; 
                    this.strengthBase = 1.5 + Math.random() * 1.5; 
                } else {
                    const scale = 0.39 + Math.random() * 0.39;
                    this.sizeW = this.sizeH = Math.min(AppState.width, AppState.height) * scale;
                    
                    const validIndices = AppState.enabledEffects.map((val, idx) => (val && (idx < 65 || idx > 68)) ? idx : -1).filter(idx => idx !== -1);
                    this.effectIndex = validIndices.length > 0 ? validIndices[Math.floor(Math.random() * validIndices.length)] : 0;
                    
                    this.timer = 0; 
                    this.duration = 10000 + Math.random() * 5000;
                    this.rotation = 0; 
                    this.strengthBase = 0.6 + Math.random() * 2.4;
                }
                
                this.changeMovement();
            }
            changeMovement() {
                const currentAxis = (Math.abs(this.targetVx) > Math.abs(this.targetVy)) ? 'x' : 'y';
                // 85% chance to make a sharp 90-degree turn, 15% chance to reverse or continue forward
                const newAxis = Math.random() < 0.85 ? (currentAxis === 'x' ? 'y' : 'x') : currentAxis;
                const dir = Math.random() < 0.5 ? 1 : -1;

                this.targetVx = 0;
                this.targetVy = 0;
                
                if (this.isSpreader) {
                    const speed = 3.0 + Math.random() * 5.0;
                    if (newAxis === 'x') this.targetVx = speed * dir;
                    else this.targetVy = speed * dir;
                    this.moveTimer = 1500 + Math.random() * 3000;
                } else {
                    const speed = 1.5 + Math.random() * 4.5;
                    if (newAxis === 'x') this.targetVx = speed * dir;
                    else this.targetVy = speed * dir;
                    this.moveTimer = 1000 + Math.random() * 2500;
                }
            }
            update(dt) {
                this.timer += dt * CONSTANTS.MS_PER_FRAME;
                this.moveTimer -= dt * CONSTANTS.MS_PER_FRAME;
                
                let isDisabled = !AppState.enabledEffects[this.effectIndex];
                
                if (this.isSpreader) {
                    let anySpreaderEnabled = false;
                    for (let i = 65; i <= 68; i++) if (AppState.enabledEffects[i]) anySpreaderEnabled = true;
                    if (!anySpreaderEnabled) isDisabled = false; // Prevent infinite reset loop if user toggles all spreaders off
                }
                
                if (this.timer >= this.duration || isDisabled) this.reset();
                else if (this.moveTimer <= 0) this.changeMovement();
                
                // Mechanical acceleration: quickly speed up to target velocity
                const inertiaEase = 1 - Math.pow(0.92, dt); 
                this.vx += (this.targetVx - this.vx) * inertiaEase;
                this.vy += (this.targetVy - this.vy) * inertiaEase;

                // Mechanical braking: aggressively bleed off momentum on the inactive axis to carve sharp corners
                if (this.targetVx === 0) this.vx *= Math.pow(0.5, dt);
                if (this.targetVy === 0) this.vy *= Math.pow(0.5, dt);

                this.x += this.vx * dt; 
                this.y += this.vy * dt;
                
                // Slow down internal rotation so the mechanical shapes stay more rigid and structured
                this.rotation += 0.005 * dt;
                
                if (this.x < 0) this.x += AppState.width; else if (this.x >= AppState.width) this.x -= AppState.width;
                if (this.y < 0) this.y += AppState.height; else if (this.y >= AppState.height) this.y -= AppState.height;
            }
        }

        function updateCellCount() {
            const targetCount = AppState.config.velocityLuma ? CONSTANTS.VELOCITY_CELL_COUNT : CONSTANTS.BASE_CELL_COUNT;
            
            let spreaders = AppState.cells.filter(c => c.isSpreader);
            if (spreaders.length === 0) spreaders.push(new Cell('spreader', true));
            else if (spreaders.length > 1) spreaders = [spreaders[0]];
            
            let normals = AppState.cells.filter(c => !c.isSpreader);
            while (normals.length < targetCount) {
                normals.push(new Cell(normals.length, false));
            }
            if (normals.length > targetCount) {
                normals.length = targetCount;
            }
            
            AppState.cells = [...spreaders, ...normals];
        }

        function resizeEngine() {
            AppState.width = canvas.width = Math.floor(window.innerWidth);
            AppState.height = canvas.height = Math.floor(window.innerHeight);
            if (AppState.width <= 0 || AppState.height <= 0) return;
            
            const grainArea = AppState.config.grainSize * AppState.config.grainSize;
            const newCount = Math.min(CONSTANTS.MAX_PARTICLES, Math.floor((AppState.width * AppState.height * CONSTANTS.COVERAGE_RATIO) / grainArea)); 
            
            const oldData = AppState.particleData;
            AppState.particleData = new Float32Array(newCount * 7); // STRIDE 7: [x, y, vx, vy, phase, luma, activeFlag]
            const isCompatible = oldData && oldData.length === AppState.particleCount * 7;
            
            for(let i=0; i<newCount; i++) {
                const offset = i * 7;
                if (isCompatible && i < AppState.particleCount) {
                    AppState.particleData.set(oldData.subarray(offset, offset+7), offset);
                } else {
                    AppState.particleData[offset] = Math.random() * AppState.width;
                    AppState.particleData[offset+1] = Math.random() * AppState.height;
                    AppState.particleData[offset+2] = 0;
                    AppState.particleData[offset+3] = 0;
                    AppState.particleData[offset+4] = Math.random() * 360;
                    AppState.particleData[offset+5] = 0; 
                    AppState.particleData[offset+6] = 1; // 1 = colored, 0 = black
                }
            }
            AppState.particleCount = newCount;
            
            if (AppState.cells.length === 0) {
                updateCellCount();
            }
        }

        let fpsFrames = 0;
        let lastFpsTime = 0;

        function engineLoop(timestamp) {
            if (AppState.width <= 0 || AppState.height <= 0) return requestAnimationFrame(engineLoop);
            
            if (!lastFpsTime) lastFpsTime = timestamp;
            fpsFrames++;
            if (timestamp - lastFpsTime >= 1000) {
                $('fps-counter').innerText = `FPS: ${fpsFrames}`;
                fpsFrames = 0;
                lastFpsTime = timestamp;
            }

            const elapsed = timestamp - AppState.lastFrameTime;
            if (elapsed < 12) return requestAnimationFrame(engineLoop);

            const dt = Math.min(2.0, elapsed / CONSTANTS.MS_PER_FRAME); 
            AppState.lastFrameTime = timestamp;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.fillRect(0, 0, AppState.width, AppState.height);
            AppState.cells.forEach(cell => cell.update(dt));
            
            const imageData = ctx.getImageData(0, 0, AppState.width, AppState.height);
            const data32 = new Uint32Array(imageData.data.buffer);
            
            const { particleData, particleCount, cells, width, height, enabledEffects, effectStrengths, config } = AppState;
            const currentPalette = PALETTE_LUTS[config.palette];
            const gs = config.grainSize;
            const lumaDecayPow = Math.pow(CONSTANTS.LUMA_DECAY, dt); 
            const isStrobe = config.palette === 'cycle_strobe_hdr';
            const cycleSpeed = isStrobe ? 15.0 : 1.0;
            const useLuma = config.velocityLuma;
            const hardEdges = config.hardEdges;
            const halfW = width / 2; const halfH = height / 2;
            
            const maxS = config.maxSpeed;
            const maxSq = maxS * maxS;

            if (config.stochasticRespawning) {
                const respawnRate = Math.min(10, particleCount);
                for(let r = 0; r < respawnRate; r++) {
                    const rIdx = Math.floor(Math.random() * particleCount) * 7;
                    particleData[rIdx] = Math.random() * width;       
                    particleData[rIdx+1] = Math.random() * height;    
                    particleData[rIdx+2] = 0;                         
                    particleData[rIdx+3] = 0;                         
                    particleData[rIdx+5] = 0;                         
                    particleData[rIdx+6] = 0; // 0 = black (waiting to be moved)
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const idx = i * 7; 
                let px = particleData[idx]; let py = particleData[idx+1];
                let vx = particleData[idx+2]; let vy = particleData[idx+3];
                let phase = particleData[idx+4]; let luma = particleData[idx+5];
                let activeColorFlag = particleData[idx+6];

                for (let c = 0; c < cells.length; c++) {
                    const cell = cells[c];
                    if (!enabledEffects[cell.effectIndex]) continue;
                    
                    let dx = px - cell.x; let dy = py - cell.y;
                    if (dx > halfW) dx -= width; else if (dx < -halfW) dx += width;
                    if (dy > halfH) dy -= height; else if (dy < -halfH) dy += height;
                    const hw = cell.sizeW / 2; const hh = cell.sizeH / 2;
                    
                    if (Math.abs(dx) < hw && Math.abs(dy) < hh) {
                        const nx = dx/hw; const ny = dy/hh;
                        const t = Math.max(Math.abs(nx), Math.abs(ny));
                        const edgeForce = hardEdges ? (t < 0.98 ? 1 : 0) : (1-t)*(1-t)*(3-2*(1-t));
                        const s = cell.strengthBase * edgeForce * dt * (effectStrengths[cell.effectIndex] * 0.01);
                        
                        if (s !== 0) activeColorFlag = 1; // Flag as moved by a cell
                        
                        const angle = Math.atan2(dy, dx); const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        switch(cell.effectIndex) {
                            // Fluid
                            case 0: /* Bubble Repulsion */ if (dist < hw/2) { vx += Math.cos(angle)*s*8; vy += Math.sin(angle)*s*8; } break;
                            case 1: /* Chaos Mix */ vx += (Math.random()-0.5)*s*10; vy += (Math.random()-0.5)*s*10; break;
                            case 2: /* Concentric Spin */ vx += Math.cos(angle+1.57)*(Math.floor(dist/20)%2==0?1:-1)*s*4; vy += Math.sin(angle+1.57)*(Math.floor(dist/20)%2==0?1:-1)*s*4; break;
                            case 3: /* Convergence */ vx -= Math.cos(angle)*s*4; vy -= Math.sin(angle)*s*4; break;
                            case 4: /* Cross Wind */ vx += Math.sin(cell.rotation)*s*5; vy += Math.cos(cell.rotation)*s*5; break;
                            case 5: /* Divergence */ vx += Math.cos(angle)*s*5; vy += Math.sin(angle)*s*5; break;
                            case 6: /* DNA Spiral */ vx += Math.sin(py*0.05+cell.rotation*2)*s*5; break;
                            case 7: /* Expansion Pulse */ vx += Math.cos(angle)*Math.sin(cell.rotation*4)*5*s; vy += Math.sin(angle)*Math.sin(cell.rotation*4)*5*s; break;
                            case 8: /* Galaxy Spiral */ vx += Math.cos(angle+1.5+cell.rotation)*s*4; vy += Math.sin(angle+1.5+cell.rotation)*s*4; break;
                            case 9: /* Lorenz Attractor */ vx += (10*(ny*10-nx*10))*s*0.05; break;
                            case 10: /* Magnetic North */ vy -= 2*s; break;
                            case 11: /* Maze Runner */ vx += ((Math.floor(px/20)+Math.floor(py/20))%2==0?1:-1)*s*4; break;
                            case 12: /* Mirror Center */ vx -= (nx*5)*s; break;
                            case 13: /* Orbitals */ vx += Math.cos(angle+1.57)*Math.sin(dist*0.15-cell.rotation*4)*s*5; vy += Math.sin(angle+1.57)*Math.sin(dist*0.15-cell.rotation*4)*s*5; break;
                            case 14: /* Perlin Drift */ vx += Math.cos(px*0.01+py*0.01+cell.rotation)*s*4; vy += Math.sin(px*0.01-py*0.01+cell.rotation)*s*4; break;
                            case 15: /* Radial Comb */ if (Math.abs(Math.sin((angle+cell.rotation)*8))>0.7){ vx += Math.cos(angle+1.57)*s*4; vy += Math.sin(angle+1.57)*s*4; } break;
                            case 16: /* Ripples */ vx += Math.cos(angle)*Math.sin(dist*0.1-cell.rotation*10)*s*3; vy += Math.sin(angle)*Math.sin(dist*0.1-cell.rotation*10)*s*3; break;
                            case 17: /* Shear */ vx += (ny>0?1:-1)*s*5; break;
                            case 18: /* Sine Sieve */ if (Math.sin(px*0.1)*Math.sin(py*0.1)>0) vx += 2*s; break;
                            case 19: /* Square Wave */ vx += Math.sign(Math.sin(py*0.1))*s*3; break;
                            case 20: /* Tangent Twist */ vx += Math.tan(nx*0.5)*s*2; vy += Math.cos(ny*3)*s*3; break;
                            case 21: /* Turbulent Flow */ vx += Math.sin(py*0.05+cell.rotation*0.5)*s*3; vy += Math.sin(px*0.05-cell.rotation*0.5)*s*3; break;
                            case 22: /* Vertical Gusts */ vy += Math.cos(px*0.02+cell.rotation*3)*s*5; break;
                            case 23: /* Vortex */ vx += Math.cos(angle+1.57)*s*4; vy += Math.sin(angle+1.57)*s*4; break;
                            case 24: /* Warp Drive */ vx += Math.cos(angle)*(1+s*3); vy += Math.sin(angle)*(1+s*3); break;
                            case 25: /* Wind Gusts */ vx += Math.sin(py*0.01+cell.rotation*5)*s*6; break;
                            case 26: /* Zoom Out */ vx += dx*0.05*s; vy += dy*0.05*s; break;

                            // Organic
                            case 27: /* Binary Tree [O] */ { const tAng = Math.atan2(py-height, px-width/2); vx += Math.cos(tAng)*s*4; vy += Math.sin(tAng)*s*4; break; }
                            case 28: /* Celtic Knots [O] */ { const gridX = Math.round(px / 60) * 60; const gridY = Math.round(py / 60) * 60; const lD = Math.sqrt((px-gridX)**2 + (py-gridY)**2); if (lD > 0) { const targetR = lD > 30 ? 45 : 15; const pull = (targetR - lD) * s * 0.3; vx += ((px-gridX)/lD) * pull; vy += ((py-gridY)/lD) * pull; vx += ((py-gridY)/lD) * s * 2; vy -= ((px-gridX)/lD) * s * 2; } break; }
                            case 29: /* Checkerboard Push [O] */ vx += ((Math.floor(px/300)+Math.floor(py/300))%2==0?1:-1)*s*3; break;
                            case 30: /* Chevron Tiling [O] */ { const segX = Math.floor(px / 40); const dir = (segX % 2 === 0) ? 1 : -1; const yTarget = Math.round((py - px * dir * 0.5) / 30) * 30 + px * dir * 0.5; vy += (yTarget - py) * s * 0.8; vx += dir * s * 2; break; }
                            case 31: /* Circuit Board [O] */ { const cxS = Math.round(px/20)*20; const cyS = Math.round(py/20)*20; if(Math.abs(cxS-px)<Math.abs(cyS-py)) vx += (cxS-px)*s*0.9; else vy += (cyS-py)*s*0.9; break; }
                            case 32: /* Concentric Squares [O] */ vx += (Math.round(dx/375)*375-dx)*s*0.5; vy += (Math.round(dy/375)*375-dy)*s*0.5; break;
                            case 33: /* Crystallize [O] */ vx += (Math.round(px/1125)*1125-px)*s*0.6; vy += (Math.round(py/1125)*1125-py)*s*0.6; break;
                            case 34: /* Diagonal Crosshatch [O] */ vx += ((px+py)%30<(px-py)%30?1:-1)*s*2; break;
                            case 35: /* Diamond Dot Array [O] */ { const dSu = Math.round((px+py)/25)*25; const dDi = Math.round((px-py)/25)*25; vx += ((dSu+dDi)/2-px)*s*0.7; vy += ((dSu-dDi)/2-py)*s*0.7; break; }
                            case 36: /* Diamond Lattice [O] */ vx += Math.cos((Math.abs(px%40-20)+Math.abs(py%40-20)))*s*2; break;
                            case 37: /* Dotted Grid [O] */ vx += (Math.round(px/15)*15-px)*s*0.8; vy += (Math.round(py/15)*15-py)*s*0.8; break;
                            case 38: /* Dotted Spirals [O] */ { const sdA = angle+dist*0.033; vx += (Math.cos(Math.round(sdA*10)/10)*dist-dx)*s*0.4; vy += (Math.sin(Math.round(sdA*10)/10)*dist-dy)*s*0.4; break; }
                            case 39: /* Dragon Curve Fold [O] */ { const dD = (Math.floor(px/40)+Math.floor(py/40))%2===0?1.57:-1.57; vx += (dx*Math.cos(dD)-dy*Math.sin(dD))*s*0.1; vy += (dx*Math.sin(dD)+dy*Math.cos(dD))*s*0.1; break; }
                            case 40: /* Fibonacci Spiral [O] */ { const gld = Math.PI*(3-Math.sqrt(5)); const fAng = Math.round(dist*0.1)*gld+cell.rotation; vx += (cell.x+Math.cos(fAng)*dist-px)*s*0.125; vy += (cell.y+Math.sin(fAng)*dist-py)*s*0.125; break; }
                            case 41: /* Gosper Hex Flow [O] */ { const gA = Math.floor(angle/(Math.PI/3))*(Math.PI/3) + Math.PI/6 + cell.rotation; vx += Math.cos(gA)*s*6; vy += Math.sin(gA)*s*6; break; }
                            case 42: /* Hex Grid [O] */ vx += (Math.round(px/30)*30-px)*s*0.4; vy += (Math.round(py/25)*25-py)*s*0.4; break;
                            case 43: /* Hexagonal Rings [O] */ { const a = Math.atan2(dy, dx); const a6 = Math.round(a / (Math.PI/3)) * (Math.PI/3); const rHex = dist * Math.cos(a - a6); const targetR = Math.round(rHex / 30) * 30; const pull = (targetR - rHex) * s * 0.4; vx += Math.cos(a6) * pull; vy += Math.sin(a6) * pull; break; }
                            case 44: /* Hilbert Curve [O] */ vx += (Math.floor(nx*8+8)+Math.floor(ny*8+8))%2==0?Math.sin(cell.rotation)*s*5:-Math.sin(cell.rotation)*s*5; vy += (Math.floor(nx*8+8)+Math.floor(ny*8+8))%2==0?Math.cos(cell.rotation)*s*5:-Math.cos(cell.rotation)*s*5; break;
                            case 45: /* Honeycomb [O] */ vx += (Math.round(px/100)*100-px)*s*0.3; vy += (Math.round(py/60)*60-py)*s*0.3; break;
                            case 46: /* Isometric Cube [O] */ { const ix = Math.round((px-py)/1.73/30)*30*1.73; const iy = Math.round((px+py)/30)*30; vx += (ix+iy/2-px)*s*0.35; vy += (iy/2-py)*s*0.35; break; }
                            case 47: /* Moore Loop Fold [O] */ { const mA = Math.floor(angle/(Math.PI/2))*(Math.PI/2) + Math.PI/4; vx += Math.cos(mA+dist*0.03)*s*5; vy += Math.sin(mA+dist*0.03)*s*5; break; }
                            case 48: /* Octagon Grid [O] */ { const p1 = px; const p2 = px*0.707 + py*0.707; const p3 = py; const p4 = px*-0.707 + py*0.707; const t1 = Math.round(p1/40)*40; const t2 = Math.round(p2/40)*40; const t3 = Math.round(p3/40)*40; const t4 = Math.round(p4/40)*40; const d1 = Math.abs(t1-p1), d2 = Math.abs(t2-p2), d3 = Math.abs(t3-p3), d4 = Math.abs(t4-p4); const md = Math.min(d1, d2, d3, d4); if (md === d1) { vx += (t1-p1)*s*0.5; } else if (md === d2) { vx += (t2-p2)*0.707*s*0.5; vy += (t2-p2)*0.707*s*0.5; } else if (md === d3) { vy += (t3-p3)*s*0.5; } else { vx -= (t4-p4)*0.707*s*0.5; vy += (t4-p4)*0.707*s*0.5; } break; }
                            case 49: /* Peano Grid Sweep [O] */ { const isX = (Math.floor(px/30)+Math.floor(py/30))%2===0; if(isX) vx += (Math.floor(px/30)%2===0?1:-1)*s*6; else vy += (Math.floor(py/30)%2===0?1:-1)*s*6; break; }
                            case 50: /* Radar Sweep [O] */ if(Math.abs(angle-(cell.rotation*2)%(Math.PI*2))<0.1 || Math.abs(angle-(cell.rotation*2)%(Math.PI*2))>Math.PI*2-0.1){ vx += Math.cos(angle)*s*6; vy += Math.sin(angle)*s*6; } break;
                            case 51: /* Radial Spokes [O] */ { const spA = Math.round(angle*4)/4; vx += (Math.cos(spA)*dist-dx)*s*0.4; vy += (Math.sin(spA)*dist-dy)*s*0.4; break; }
                            case 52: /* Serendipity Dots [O] */ { const sdTX = Math.floor(cell.x/50)*50+Math.cos(cell.id)*hw; const sdTY = Math.floor(cell.y/50)*50+Math.sin(cell.id)*hh; vx += (sdTX-px)*s*0.048; vy += (sdTY-py)*s*0.048; break; }
                            case 53: /* Sierpinski Repulsion [O] */ { const tx = (px%60)-30; const ty = (py%52)-26; if (ty > Math.abs(tx)*1.732-26) { vx += Math.sign(tx)*s*5; vy -= s*5; } else { vx -= Math.sign(tx)*s*2; vy += s*2; } break; }
                            case 54: /* Tartan Plaid [O] */ if(px%45<5) vy += Math.sin(px*0.01)*s*4; if(py%45<5) vx += Math.cos(py*0.01)*s*4; break;
                            case 55: /* Triangle Tessellation [O] */ { const a1 = 0, a2 = Math.PI/3, a3 = 2*Math.PI/3; const p1 = px*Math.cos(a1) + py*Math.sin(a1); const p2 = px*Math.cos(a2) + py*Math.sin(a2); const p3 = px*Math.cos(a3) + py*Math.sin(a3); const t1 = Math.round(p1/30)*30, t2 = Math.round(p2/30)*30, t3 = Math.round(p3/30)*30; const d1 = Math.abs(t1-p1), d2 = Math.abs(t2-p2), d3 = Math.abs(t3-p3); if(d1 < d2 && d1 < d3) { vx += Math.cos(a1)*(t1-p1)*s*0.5; vy += Math.sin(a1)*(t1-p1)*s*0.5; } else if(d2 < d3) { vx += Math.cos(a2)*(t2-p2)*s*0.5; vy += Math.sin(a2)*(t2-p2)*s*0.5; } else { vx += Math.cos(a3)*(t3-p3)*s*0.5; vy += Math.sin(a3)*(t3-p3)*s*0.5; } break; }
                            case 56: /* Vertical Pinstripes [O] */ vx += (Math.round(px/12)*12-px)*s*0.9; break;
                            case 57: /* Voronoi Cells [O] */ vx += (Math.floor(px/300)*300+150-px)*s*0.6; vy += (Math.floor(py/300)*300+150-py)*s*0.6; break;
                            case 58: /* Weave Lattice [O] */ vx += ((Math.floor(px/25)+Math.floor(py/25))%2==0?1:-1)*s*3; vy += -((Math.floor(px/25)+Math.floor(py/25))%2==0?1:-1)*s*3; break;
                            case 59: /* Ziggurat [O] */ vx += (Math.floor(px/40)*40+(py%40)-px)*s*0.5; break;

                            // Chroma
                            case 60: /* Chromatic Wave [C] */ vx += Math.cos(angle)*Math.sin(dist*0.1 - cell.rotation)*s*1; break;
                            case 61: /* Color Gradient Snap [C] */ vx += (Math.round(px/40)*40-px)*s*3.2; break;
                            case 62: /* Color Grid Snap [C] */ { const cgOfs = (phase/360)*20; vx += (Math.round((px + cgOfs)/30)*30 - cgOfs - px)*s*0.6; break; }
                            case 63: /* Green Channel Sieve [C] */ break;
                            case 64: /* Intensity Well [C] */ vx += Math.cos(angle)*s*1.25; vy += Math.sin(angle)*s*1.25; break;

                            // Spreader
                            case 65: /* Concentric Repel [S] */ { const rS = s * (1.0 + Math.random() * 2.0); const rA = angle + (Math.random() - 0.5); const repel = Math.sin(dist * 0.1); vx += Math.cos(rA) * repel * rS * 10; vy += Math.sin(rA) * repel * rS * 10; break; }
                            case 66: /* Noise Expulsion [S] */ { const rS = s * (1.0 + Math.random() * 2.0); vx += (Math.cos(px * 0.02 + py * 0.02) + (Math.random()-0.5)) * rS * 10; vy += (Math.sin(px * 0.02 - py * 0.02) + (Math.random()-0.5)) * rS * 10; break; }
                            case 67: /* Wave Diffuser [S] */ { const rS = s * (1.0 + Math.random() * 2.0); vx += (Math.sin(py * 0.05) + (Math.random()-0.5)) * rS * 8; vy += (Math.cos(px * 0.05) + (Math.random()-0.5)) * rS * 8; break; }
                            case 68: /* ZigZag Scatter [S] */ { const rS = s * (1.0 + Math.random() * 2.0); vx += ((((py / 30 | 0) % 2 === 0) ? 1 : -1) + (Math.random()-0.5)) * rS * 8; vy += ((((px / 30 | 0) % 2 === 0) ? 1 : -1) + (Math.random()-0.5)) * rS * 8; break; }

                            // 3D
                            case 69: /* Double Helix 3D [3D] */ { const t = cell.rotation * 4; const freq = 0.05; const amp = hw * 0.4; const wave1X = Math.sin(dy * freq + t) * amp; const wave1Z = Math.cos(dy * freq + t) * amp; const wave2X = Math.sin(dy * freq + t + Math.PI) * amp; const wave2Z = Math.cos(dy * freq + t + Math.PI) * amp; const pull1 = (wave1X - dx) * s * (wave1Z > 0 ? 3 : 0.5); const pull2 = (wave2X - dx) * s * (wave2Z > 0 ? 3 : 0.5); vx += Math.abs(wave1X - dx) < Math.abs(wave2X - dx) ? pull1 : pull2; vy += (Math.round(dy/20)*20 - dy) * s * 0.1; break; }
                            case 70: /* Hyperbolic Funnel [3D] */ { const tF = cell.rotation * 2; const radiusAtY = Math.sqrt(Math.abs(dy)) * 12; const thetaF = Math.atan2(1, dx) + tF; const snapThetaF = Math.round(thetaF / (Math.PI/4)) * (Math.PI/4); const targetX = Math.cos(snapThetaF - tF) * radiusAtY; vx += (targetX - dx) * s * 2; vy += Math.sign(dy) * s * 2; break; }
                            case 71: /* Mobius Strip [3D] */ { const u = Math.atan2(dy, dx); const vM = (dist - hw*0.5); const tM = cell.rotation * 2; const halfU = u * 0.5 + tM; const moX = (hw*0.5 + vM * Math.cos(halfU)) * Math.cos(u); const moY = (hw*0.5 + vM * Math.cos(halfU)) * Math.sin(u) * 0.5; vx += (moX - dx) * s; vy += (moY - dy) * s; if (Math.abs(vM) < hw*0.2) { vx += Math.cos(u) * Math.sin(vM*0.5)*s*5; } break; }
                            case 72: /* Perspective Tunnel [3D] */ { const zT = (cell.rotation * 200) % 50; const ringDist = Math.round((dist - zT) / 50) * 50 + zT; const pullDist = ringDist - dist; vx += Math.cos(angle) * pullDist * s; vy += Math.sin(angle) * pullDist * s; const snapA = Math.round(angle / (Math.PI/6)) * (Math.PI/6); vx += (Math.cos(snapA)*dist - dx)*s*0.5; vy += (Math.sin(snapA)*dist - dy)*s*0.5; break; }
                            case 73: /* Ripple Plane 3D [3D] */ { const pitch = 0.8; const gy = dy / Math.sin(pitch); const gx = dx; const rippleZ = Math.sin(Math.sqrt(gx*gx + gy*gy)*0.05 - cell.rotation*5) * 40; const projY = gy * Math.sin(pitch) - rippleZ * Math.cos(pitch); vy += (projY - dy) * s * 2; vx += (Math.round(gx/30)*30 - gx) * s * 0.5; break; }
                            case 74: /* Rotating 3D Grid [3D] */ { const pitch = Math.sin(cell.rotation * 0.5) * 1.5; const yaw = cell.rotation; const cosY = Math.cos(yaw), sinY = Math.sin(yaw); const cosP = Math.cos(pitch), sinP = Math.sin(pitch); const gx = dx*cosY + dy*sinY*sinP; const gy = dy*cosP; vx += (Math.round(gx/25)*25 - gx)*s; vy += (Math.round(gy/25)*25 - gy)*s; break; }
                            case 75: /* Rotating Cube Edges [3D] */ { const tC = cell.rotation; const cosT = Math.cos(tC), sinT = Math.sin(tC); const rx = dx * cosT - dy * sinT; const ry = dx * sinT + dy * cosT; const d1 = Math.abs(Math.round(rx/40)*40 - rx); const d2 = Math.abs(Math.round(ry/40)*40 - ry); const d3 = Math.abs(Math.round((rx+ry)/40)*40 - (rx+ry)); if (d1 < d2 && d1 < d3) { vx += (Math.round(rx/40)*40 - rx)*cosT * s; vy += (Math.round(rx/40)*40 - rx)*-sinT * s; } else if (d2 < d3) { vx += (Math.round(ry/40)*40 - ry)*sinT * s; vy += (Math.round(ry/40)*40 - ry)*cosT * s; } else { vx += (Math.round((rx+ry)/40)*40 - (rx+ry))*0.7 * s; vy += (Math.round((rx+ry)/40)*40 - (rx+ry))*0.7 * s; } break; }
                            case 76: /* Torus Parametric [3D] */ { const R = hw * 0.5; const rR = hw * 0.25; const t = cell.rotation; const dCenter = Math.sqrt(dx*dx + (dy/0.5)*(dy/0.5)); if (Math.abs(dCenter - R) < rR) { const theta = Math.atan2(dy/0.5, dx); const phi = Math.atan2(dCenter - R, 0) + t*5; const snapTheta = Math.round(theta / (Math.PI/8)) * (Math.PI/8); const snapPhi = Math.round(phi / (Math.PI/4)) * (Math.PI/4); vx += (Math.cos(snapTheta)*(R + rR*Math.cos(snapPhi)) - dx) * s; vy += (Math.sin(snapTheta)*0.5*(R + rR*Math.cos(snapPhi)) - dy) * s; } break; }
                            case 77: /* Wireframe Sphere [3D] */ { const r2 = hw*hw*0.64; const d2 = dx*dx + dy*dy; if (d2 < r2) { const z = Math.sqrt(r2 - d2); const t = cell.rotation * 2; const rx = dx * Math.cos(t) - z * Math.sin(t); const rz = dx * Math.sin(t) + z * Math.cos(t); const lat = Math.asin(dy / (hw*0.8)); const lon = Math.atan2(rx, rz); const snapLat = Math.round(lat / 0.3) * 0.3; const snapLon = Math.round(lon / 0.3) * 0.3; vx += (Math.sin(snapLon)*hw*0.8*Math.cos(lat) - dx)*s*0.5; vy += (Math.sin(snapLat)*hw*0.8 - dy)*s*0.5; } break; }
                            
                            // Cymatics
                            case 78: /* Harmonic Resonance [A] */ { const freq = 0.15; const force = Math.sin(dist * freq) * Math.cos(dist * freq); vx -= Math.cos(angle) * force * s * 50; vy -= Math.sin(angle) * force * s * 50; break; }
                            case 79: /* Low-Frequency Hum [A] */ { const freq = 0.03; const t = cell.rotation * 2; const fX = Math.sin(px * freq + t) * Math.cos(px * freq + t); const fY = Math.sin(py * freq + t) * Math.cos(py * freq + t); vx -= fX * s * 30; vy -= fY * s * 30; break; }
                            case 80: /* Sawtooth Vibration [A] */ { const freq = 60; const sx = ((px + cell.rotation*30) % freq) / freq - 0.5; const sy = ((py - cell.rotation*30) % freq) / freq - 0.5; vx -= Math.sign(sx) * s * 6; vy -= Math.sign(sy) * s * 6; break; }
                        }
                    }
                }

                // MAX SPEED LIMIT CLAMP
                let preSpeedSq = vx*vx + vy*vy;
                if (preSpeedSq > maxSq) {
                    const m = maxS / Math.sqrt(preSpeedSq);
                    vx *= m;
                    vy *= m;
                    preSpeedSq = maxSq;
                }

                px += vx * CONSTANTS.BASE_SPEED * dt;
                py += vy * CONSTANTS.BASE_SPEED * dt;
                
                // DYNAMIC MOMENTUM: Fast particles slip through friction to escape cells
                const speedRatio = preSpeedSq / maxSq;
                const dynamicFriction = CONSTANTS.FRICTION + (0.055 * speedRatio);
                const pFPow = Math.pow(dynamicFriction, dt);
                
                vx *= pFPow;
                vy *= pFPow;
                phase = (phase + cycleSpeed * dt) % 360;

                if (px < 0) px += width; else if (px >= width) px -= width;
                if (py < 0) py += height; else if (py >= height) py -= height;

                const currentV2 = (vx*vx + vy*vy);
                const targetLuma = Math.min(1.0, currentV2 / maxSq);
                luma = Math.max(targetLuma, luma * lumaDecayPow);

                particleData[idx] = px; particleData[idx+1] = py;
                particleData[idx+2] = vx; particleData[idx+3] = vy;
                particleData[idx+4] = phase; particleData[idx+5] = luma;
                particleData[idx+6] = activeColorFlag;

                let color;
                if (activeColorFlag === 0) {
                    color = (255 << 24); // Solid black
                } else {
                    color = currentPalette[phase | 0];
                    if (useLuma) {
                        const r = (color & 0xFF) * luma;
                        const g = ((color >> 8) & 0xFF) * luma;
                        const b = ((color >> 16) & 0xFF) * luma;
                        color = (255 << 24) | (b << 16) | (g << 8) | r;
                    }
                }

                const iPX = px|0; const iPY = py|0;
                if (gs === 1) {
                    data32[iPY * width + iPX] = color;
                } else {
                    for(let gy=0; gy<gs; gy++) {
                        const y_off = iPY + gy;
                        if (y_off >= height || y_off < 0) continue;
                        const row = y_off * width;
                        for(let gx=0; gx<gs; gx++) {
                            const x_off = iPX + gx;
                            if (x_off >= width || x_off < 0) continue;
                            data32[row + x_off] = color;
                        }
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);

            // ANALYSIS MODE RENDERING (Draws over top of the particle buffer)
            if (config.analysisMode) {
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.font = '12px "Pixelify Sans", sans-serif';
                ctx.textBaseline = 'bottom';
                
                for (let c = 0; c < cells.length; c++) {
                    const cell = cells[c];
                    if (!enabledEffects[cell.effectIndex]) continue;
                    
                    const hw = cell.sizeW / 2;
                    const hh = cell.sizeH / 2;
                    const left = cell.x - hw;
                    const top = cell.y - hh;
                    
                    ctx.strokeRect(left, top, cell.sizeW, cell.sizeH);
                    ctx.fillText(EFFECTS[cell.effectIndex] || "Unknown", left + 4, top + cell.sizeH - 4);
                }
            }

            requestAnimationFrame(engineLoop);
        }

        setupUIEvents();
        updateCanvasFilter();
        resizeEngine(); 
        requestAnimationFrame(engineLoop);
    </script>
