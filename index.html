<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL SAND - V4.8.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffffff; --bg: #000; --panel-bg: #050505; --border: #333; --text-muted: #888; }
        body { margin: 0; overflow: hidden; background-color: var(--bg); display: flex; justify-content: center; align-items: center; font-family: 'Pixelify Sans', sans-serif; color: var(--accent); user-select: none; }
        canvas { display: block; touch-action: none; cursor: crosshair; opacity: 0; transition: opacity 1s ease, filter 0.3s ease; }
        
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.15); display: none; flex-direction: column; align-items: center; padding: 20px; z-index: 100; overflow-y: auto; border: 2px solid var(--border); }
        #menu-overlay.active { display: flex; }
        
        .terminal-header { width: 100%; max-width: 900px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; box-sizing: border-box; }
        .terminal-header h2 { margin: 0; font-size: 16px; opacity: 0.6; letter-spacing: 1px; }
        
        .settings-panel { background: var(--panel-bg); padding: 12px; border: 1px solid var(--border); margin-bottom: 15px; width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        .setting-group { display: flex; flex-direction: column; gap: 6px; }
        .setting-label { font-size: 12px; color: var(--accent); opacity: 0.5; text-transform: uppercase; }
        
        .controls { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 900px; box-sizing: border-box; }
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; cursor: pointer; font-family: 'Pixelify Sans', sans-serif; font-size: 12px; transition: all 0.1s; text-transform: uppercase; }
        .btn:hover, .btn.active { background: var(--accent); color: var(--bg); }
        
        details { width: 100%; max-width: 900px; border: 1px solid #1a1a1a; margin-bottom: 4px; background: #080808; box-sizing: border-box; }
        summary { padding: 8px; cursor: pointer; font-size: 14px; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        details[open] summary { border-bottom: 1px solid var(--border); color: #fff; }
        
        .effect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; padding: 10px; }
        .effect-card { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .effect-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .effect-name { font-size: 11px; color: var(--text-muted); }
        .active-text { color: var(--accent) !important; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: #1a1a1a; outline: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border: 1px solid var(--bg); }
        .strength-label { font-size: 10px; color: #333; display: flex; justify-content: space-between; }
        
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; width: 100%; }
        .palette-grid .btn { font-size: 10px; padding: 4px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #save-indicator { position: fixed; bottom: 10px; right: 10px; font-size: 12px; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
        #fps-counter { position: fixed; top: 15px; left: 15px; font-size: 14px; color: var(--accent); font-family: 'Pixelify Sans', monospace; z-index: 200; display: none; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="save-indicator">>> SYNC_SUCCESS</div>
    <div id="fps-counter">FPS: 00</div>

    <div id="menu-overlay">
        <div class="terminal-header"><h2>DIGITAL SAND - V4.8.3 (SWEEPING SPREADERS)</h2></div>

        <div class="settings-panel">
            <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end;">
                <div class="setting-group">
                    <span class="setting-label">FIELD_FALLOFF</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn" id="btn-soft">[ SOFT ]</button>
                        <button class="btn" id="btn-hard">[ HARD ]</button>
                    </div>
                </div>
                <div class="setting-group">
                    <span class="setting-label">BRIGHTNESS</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn" id="btn-velocity-luma">[ VELOCITY_MAP ]</button>
                    </div>
                </div>
                <div class="setting-group" style="flex-grow: 1; min-width: 150px;">
                    <div class="strength-label" style="margin-bottom: 5px;">
                        <span class="setting-label">MAX_SPEED</span>
                        <span id="label-max-speed" style="font-size: 12px; color: var(--accent);">15</span>
                    </div>
                    <input type="range" id="slider-max-speed" min="2" max="40" value="15">
                </div>
            </div>
            <div class="setting-group">
                <span class="setting-label">COLOR_MAP (5-COL_GRID)</span>
                <div class="palette-grid" id="palette-list"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="toggle-all">[ Toggle_All ]</button>
            <button class="btn" id="randomise">[ RANDOMISE ]</button>
            <button class="btn" id="reset-settings">[ RESET ]</button>
            <button class="btn" id="close-menu">[ RESUME ]</button>
        </div>
        
        <details><summary><span>[ SPREADERS ]</span><span>+</span></summary><div class="effect-grid" id="cat-spreader"></div></details>
        <details><summary><span>[ ORGANIC ]</span><span>+</span></summary><div class="effect-grid" id="cat-organic"></div></details>
        <details><summary><span>[ FLUID ]</span><span>+</span></summary><div class="effect-grid" id="cat-fluid"></div></details>
        <details><summary><span>[ CHROMA ]</span><span>+</span></summary><div class="effect-grid" id="cat-chroma"></div></details>
        <div style="height: 400px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // 1. CONSTANTS & CONFIGURATION
        // ==========================================
        const CONSTANTS = {
            BASE_CELL_COUNT: 5,
            VELOCITY_CELL_COUNT: 11,
            FRICTION: 0.94,
            LUMA_DECAY: 0.988, 
            BASE_SPEED: 0.5,
            MAX_PARTICLES: 315000,
            COVERAGE_RATIO: 0.2625,
            MS_PER_FRAME: 16.66
        };

        const EFFECTS = [
            "Lorenz Attractor", "Galaxy Spiral", "Wind Gusts", "Ripples", "Hex Grid [O]", "Diamond Lattice [O]", 
            "Vortex", "Divergence", "Convergence", "Shear", "Radial Comb", "Cross Wind", "Vertical Gusts", 
            "Orbitals", "Square Wave", "Bubble Repulsion", "Chaos Mix", "Warp Drive", "Mirror Center", 
            "Crystallize [O]", "Turbulent Flow", "Sine Sieve", "Expansion Pulse", "Tangent Twist", "DNA Spiral",
            "Perlin Drift", "Concentric Spin", "Zoom Out", "Magnetic North", "Maze Runner", "Concentric Squares [O]", 
            "Dotted Grid [O]", "Vertical Pinstripes [O]", "Diagonal Crosshatch [O]", "Honeycomb [O]", "Radial Spokes [O]", 
            "Ziggurat [O]", "Dotted Spirals [O]", "Checkerboard Push [O]", "Diamond Dot Array [O]", "Fibonacci Spiral [O]", 
            "Mandelbrot Boundary [O]", "Voronoi Cells [O]", "Hilbert Curve [O]", "Binary Tree [O]", "Isometric Cube [O]", 
            "Radar Sweep [O]", "Circuit Board [O]", "Tartan Plaid [O]", "Serendipity Dots [O]", "Weave Lattice [O]", 
            "Luma Attraction [C]", "RGB Spectral Drift [C]", "Chrome Saturation Sort [C]", "Red/Blue Divergence [C]", 
            "Green Channel Sieve [C]", "Color Gradient Snap [C]", "Hue Orbital Ring [C]", "Inverse Luma Push [C]", 
            "Warm/Cool Shear [C]", "Luma Staircase [C]", "RGB Corner Sort [C]", "Saturation Barrier [C]", 
            "Hue Angular Mapper [C]", "Primary Spin [C]", "Intensity Well [C]", "CMY Divergence [C]", 
            "Chromatic Wave [C]", "Color Grid Snap [C]",
            
            // --- NEW SPREADER EFFECTS (Indices 69 to 78) ---
            "Radial Scatter [S]", "Wave Diffuser [S]", "Outward Spiral [S]", "Noise Expulsion [S]", "Axis Repeller [S]", 
            "Fractal Burst [S]", "Concentric Repel [S]", "ZigZag Scatter [S]", "Polar Ejector [S]", "Whirlwind Push [S]"
        ];

        // Telemetry calibration values
        const DEFAULT_STRENGTHS = [
            100, 28, 200, 200, 200, 200, 200, 7, 100, 100, 100, 100, 100, 100, 100, 100, 200, 5, 200, 200, 
            8, 9, 23, 24, 56, 123, 164, 200, 51, 200, 200, 200, 200, 200, 100, 200, 200, 5, 100, 200, 
            1, 200, 5, 200, 200, 5, 200, 100, 200, 34, 200, 7, 133, 100, 14, 44, 200, 200, 22, 200, 
            16, 9, 8, 7, 200, 32, 14, 200, 200,
            
            // --- NEW SPREADER STRENGTHS ---
            200, 200, 200, 200, 200, 200, 200, 200, 200, 200
        ];

        const PALETTE_DEFS = {
            cyclic: {
                rainbow_hdr: [{r:255,g:0,b:0},{r:255,g:255,b:0},{r:0,g:255,b:0},{r:0,g:255,b:255},{r:0,g:0,b:255},{r:255,g:0,b:255}],
                strobe_hdr: [{r:0,g:0,b:0},{r:85,g:85,b:85},{r:170,g:170,b:170},{r:255,g:255,b:255}],
                toxic: [{r:173,g:255,b:47},{r:255,g:255,b:0},{r:50,g:205,b:50}],
                abyss: [{r:0,g:10,b:30},{r:0,g:255,b:255},{r:0,g:100,b:150}],
                glitch: [{r:255,g:0,b:255},{r:0,g:255,b:255},{r:255,g:255,b:255}],
                volcano: [{r:40,g:0,b:0},{r:255,g:69,b:0},{r:255,g:215,b:0}],
                nebula: [{r:75,g:0,b:130},{r:199,g:21,b:133},{r:0,g:0,b:139}],
                gold: [{r:101,g:67,b:33},{r:255,g:215,b:0},{r:255,g:255,b:200}],
                ghost: [{r:255,g:255,b:255},{r:176,g:196,b:222},{r:72,g:61,b:139}],
                plasma: [{r:148,g:0,b:211},{r:75,g:0,b:130},{r:255,g:0,b:255}],
                seafoam: [{r:64,g:224,b:208},{r:127,g:255,b:212},{r:0,g:128,b:128}]
            },
            static: {
                spectrum: [{r:255,g:0,b:0},{r:255,g:255,b:0},{r:0,g:255,b:0},{r:0,g:255,b:255},{r:0,g:0,b:255},{r:255,g:0,b:255}],
                neon: [{r:255,g:0,b:128},{r:0,g:255,b:255},{r:128,g:0,b:255},{r:255,g:255,b:255}],
                sunset: [{r:255,g:50,b:0},{r:255,g:200,b:0},{r:100,g:0,b:150},{r:255,g:255,b:200}],
                deepsea: [{r:0,g:20,b:50},{r:0,g:255,b:150},{r:0,g:100,b:255},{r:200,g:255,b:255}],
                matrix: [{r:0,g:40,b:0},{r:0,g:255,b:70},{r:20,g:100,b:20},{r:0,g:255,b:0}],
                cyber: [{r:255,g:0,b:255},{r:0,g:255,b:255},{r:255,g:255,b:0},{r:255,g:0,b:100}],
                magma: [{r:40,g:0,b:0},{r:255,g:0,b:0},{r:255,g:120,b:0},{r:255,g:255,b:0}],
                frost: [{r:0,g:50,b:100},{r:100,g:200,b:255},{r:200,g:255,b:255},{r:255,g:255,b:255}],
                vapor: [{r:255,g:113,b:206},{r:1,g:205,b:254},{r:5,g:255,b:161},{r:185,g:103,b:255},{r:255,g:251,b:150}],
                royal: [{r:75,g:0,b:130},{r:255,g:215,b:0},{r:139,g:0,b:139},{r:218,g:165,b:32}],
                autumn: [{r:139,g:69,b:19},{r:210,g:105,b:30},{r:255,g:140,b:0},{r:255,g:69,b:0}],
                toxic: [{r:173,g:255,b:47},{r:148,g:0,b:211},{r:50,g:205,b:50},{r:139,g:0,b:139}],
                berry: [{r:0,g:0,b:139},{r:220,g:20,b:60},{r:199,g:21,b:133},{r:75,g:0,b:130}],
                midnight: [{r:25,g:25,b:112},{r:0,g:0,b:205},{r:72,g:61,b:139},{r:176,g:196,b:222}],
                coral: [{r:255,g:127,b:80},{r:64,g:224,b:208},{r:255,g:99,b:71},{r:127,g:255,b:212}],
                synth: [{r:36,g:0,b:70},{r:90,g:24,b:154},{r:157,g:78,b:221},{r:255,g:0,b:110}],
                monochrome: [{r:255,g:255,b:255},{r:255,g:255,b:255}],
                monogold: [{r:101,g:67,b:33},{r:255,g:215,b:0},{r:218,g:165,b:32},{r:255,g:255,b:150}]
            }
        };

        // ==========================================
        // 2. STATE MANAGEMENT
        // ==========================================
        const AppState = {
            width: window.innerWidth,
            height: window.innerHeight,
            particleData: null,
            particleCount: 0,
            cells: [],
            lastFrameTime: performance.now(),
            config: { hardEdges: false, velocityLuma: false, palette: 'cycle_rainbow_hdr', grainSize: 1, maxSpeed: 15 },
            enabledEffects: new Array(EFFECTS.length).fill(true),
            effectStrengths: [...DEFAULT_STRENGTHS]
        };

        // ==========================================
        // 3. UTILITIES & PRE-COMPUTATION
        // ==========================================
        const $ = id => document.getElementById(id);
        const el = (tag, props = {}) => Object.assign(document.createElement(tag), props);
        const shuffle = arr => arr.sort(() => Math.random() - 0.5);

        const PALETTE_LUTS = {};
        const lerpColor = (c1, c2, t) => ({
            r: c1.r + (c2.r - c1.r) * t | 0,
            g: c1.g + (c2.g - c1.g) * t | 0,
            b: c1.b + (c2.b - c1.b) * t | 0
        });

        function buildLUTs() {
            const createLUT = (stops, isCyclic) => {
                const lut = new Uint32Array(360);
                for (let i = 0; i < 360; i++) {
                    const t = isCyclic ? (i / 360) * stops.length : (i / 359) * (stops.length - 1);
                    const idx1 = Math.floor(t) % stops.length;
                    const idx2 = isCyclic ? (idx1 + 1) % stops.length : Math.min(idx1 + 1, stops.length - 1);
                    const c = lerpColor(stops[idx1], stops[idx2], t % 1);
                    lut[i] = (255 << 24) | (c.b << 16) | (c.g << 8) | c.r; 
                }
                return lut;
            };
            Object.entries(PALETTE_DEFS.cyclic).forEach(([k, stops]) => PALETTE_LUTS[`cycle_${k}`] = createLUT(stops, true));
            Object.entries(PALETTE_DEFS.static).forEach(([k, stops]) => PALETTE_LUTS[k] = createLUT(stops, false));
        }
        buildLUTs();

        function updateCanvasFilter() {
            if (AppState.config.palette === 'cycle_rainbow_hdr' || AppState.config.palette === 'cycle_strobe_hdr') {
                $('canvas').style.filter = 'saturate(1.5) contrast(1.2) brightness(1.2)';
            } else {
                $('canvas').style.filter = 'none';
            }
        }

        // ==========================================
        // 4. PERSISTENCE LAYER (Firebase + LocalStorage)
        // ==========================================
        const FIREBASE_CONFIG = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'standalone-sand-art';
        let db = null, user = null;

        if (FIREBASE_CONFIG) {
            const fApp = initializeApp(FIREBASE_CONFIG);
            const auth = getAuth(fApp);
            db = getFirestore(fApp);
            onAuthStateChanged(auth, u => { user = u; if (u) syncLoad(); });
            const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
            if (token) signInWithCustomToken(auth, token); else signInAnonymously(auth);
        } else {
            setTimeout(syncLoad, 50);
        }

        async function syncSave() {
            const data = { config: AppState.config, enabledEffects: AppState.enabledEffects, effectStrengths: AppState.effectStrengths, timestamp: Date.now() };
            try { localStorage.setItem('sand_art_state', JSON.stringify(data)); } catch(e) {}
            if (db && user) {
                try { await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'current'), data); } 
                catch (e) { console.warn("Cloud sync disabled."); }
            }
            const ind = $('save-indicator');
            if (ind) { ind.style.opacity = 1; setTimeout(() => ind.style.opacity = 0, 2000); }
        }

        async function syncLoad() {
            let data = null;
            if (db && user) {
                try {
                    const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'current'));
                    if (snap.exists()) data = snap.data();
                } catch(e) {}
            }
            if (!data) {
                try { const local = localStorage.getItem('sand_art_state'); if (local) data = JSON.parse(local); } catch(e) {}
            }
            if (data) {
                Object.assign(AppState.config, data.config);
                if (AppState.config.maxSpeed === undefined) AppState.config.maxSpeed = 15;
                if (AppState.config.palette === 'cycle_rainbow') AppState.config.palette = 'cycle_rainbow_hdr';
                if (AppState.config.palette === 'cycle_strobe') AppState.config.palette = 'cycle_strobe_hdr';
                
                // Expand arrays if returning user loads an older save with fewer effects
                if (data.enabledEffects) {
                    AppState.enabledEffects = data.enabledEffects;
                    while (AppState.enabledEffects.length < EFFECTS.length) AppState.enabledEffects.push(true);
                }
                if (data.effectStrengths) {
                    AppState.effectStrengths = data.effectStrengths;
                    while (AppState.effectStrengths.length < DEFAULT_STRENGTHS.length) {
                        AppState.effectStrengths.push(DEFAULT_STRENGTHS[AppState.effectStrengths.length]);
                    }
                }
            }
            updateUIToggles();
            updateCanvasFilter();
            resizeEngine();
            buildMenuDOM();
            
            // Fade in canvas on first load
            setTimeout(() => {
                const cvs = document.getElementById('canvas');
                if (cvs) cvs.style.opacity = '1';
            }, 50);
        }

        // ==========================================
        // 5. UI & DOM MANAGEMENT
        // ==========================================
        const canvas = $('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const menu = $('menu-overlay');

        function updateUIToggles() {
            $('btn-soft').classList.toggle('active', !AppState.config.hardEdges);
            $('btn-hard').classList.toggle('active', AppState.config.hardEdges);
            $('btn-velocity-luma').classList.toggle('active', AppState.config.velocityLuma);
            $('slider-max-speed').value = AppState.config.maxSpeed;
            $('label-max-speed').innerText = AppState.config.maxSpeed;
        }

        function buildMenuDOM() {
            const containers = { '[O]': $('cat-organic'), '[C]': $('cat-chroma'), '[S]': $('cat-spreader'), 'default': $('cat-fluid') };
            Object.values(containers).forEach(c => c.innerHTML = '');

            EFFECTS.forEach((name, idx) => {
                const wrapper = el('div', { className: 'effect-item-wrapper' });
                const topRow = el('div', { className: 'effect-row-top' });
                const label = el('span', { className: `effect-name ${AppState.enabledEffects[idx] ? 'active-text' : ''}`, innerText: name });
                
                const checkbox = el('input', { type: 'checkbox', checked: AppState.enabledEffects[idx] });
                checkbox.onchange = e => {
                    AppState.enabledEffects[idx] = e.target.checked;
                    label.classList.toggle('active-text', e.target.checked);
                    syncSave();
                };
                topRow.append(label, checkbox);

                const slider = el('input', { type: 'range', min: '0', max: '200', value: AppState.effectStrengths[idx] });
                const sLabel = el('div', { className: 'strength-label', innerHTML: `<span>POWER</span><span>${AppState.effectStrengths[idx]}%</span>` });
                slider.oninput = e => {
                    AppState.effectStrengths[idx] = parseInt(e.target.value);
                    sLabel.innerHTML = `<span>POWER</span><span>${AppState.effectStrengths[idx]}%</span>`;
                };
                slider.onchange = syncSave;

                wrapper.append(topRow, slider, sLabel);
                
                const type = name.includes('[O]') ? '[O]' : (name.includes('[C]') ? '[C]' : (name.includes('[S]') ? '[S]' : 'default'));
                containers[type].appendChild(wrapper);
            });

            const pList = $('palette-list');
            pList.innerHTML = '';
            [...Object.keys(PALETTE_DEFS.cyclic).map(k=>`cycle_${k}`), ...Object.keys(PALETTE_DEFS.static)].forEach(key => {
                const btn = el('button', {
                    className: `btn ${AppState.config.palette === key ? 'active' : ''}`,
                    innerText: key.includes('cycle') ? `[ ${key.split('_').slice(1).join('_').toUpperCase()} ]` : key.charAt(0).toUpperCase() + key.slice(1)
                });
                btn.onclick = () => {
                    document.querySelectorAll('#palette-list .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    AppState.config.palette = key;
                    updateCanvasFilter();
                    syncSave();
                };
                pList.appendChild(btn);
            });
        }

        function setupUIEvents() {
            $('btn-soft').onclick = () => { AppState.config.hardEdges = false; updateUIToggles(); syncSave(); };
            $('btn-hard').onclick = () => { AppState.config.hardEdges = true; updateUIToggles(); syncSave(); };
            $('btn-velocity-luma').onclick = () => { 
                AppState.config.velocityLuma = !AppState.config.velocityLuma; 
                updateUIToggles(); 
                updateCellCount();
                syncSave(); 
            };
            
            $('slider-max-speed').oninput = e => {
                AppState.config.maxSpeed = parseInt(e.target.value);
                $('label-max-speed').innerText = AppState.config.maxSpeed;
            };
            $('slider-max-speed').onchange = syncSave;

            canvas.onclick = e => { 
                if (e.target === canvas) { 
                    menu.classList.add('active'); 
                    $('fps-counter').style.display = 'block';
                    buildMenuDOM(); 
                } 
            };
            $('close-menu').onclick = () => {
                menu.classList.remove('active');
                $('fps-counter').style.display = 'none';
            };
            menu.onclick = e => { 
                if (e.target === menu) {
                    menu.classList.remove('active');
                    $('fps-counter').style.display = 'none';
                }
            };
            
            $('toggle-all').onclick = () => {
                const target = !AppState.enabledEffects.some(e => e); 
                AppState.enabledEffects.fill(target); buildMenuDOM(); syncSave();
            };

            $('reset-settings').onclick = () => {
                localStorage.removeItem('sand_art_state');
                AppState.config = { hardEdges: false, velocityLuma: false, palette: 'cycle_rainbow_hdr', grainSize: 1, maxSpeed: 15 };
                AppState.enabledEffects = new Array(EFFECTS.length).fill(true);
                AppState.effectStrengths = [...DEFAULT_STRENGTHS];
                updateUIToggles();
                updateCanvasFilter();
                resizeEngine(); 
                buildMenuDOM(); 
                syncSave();
            };

            $('randomise').onclick = () => {
                AppState.enabledEffects.fill(false);
                const getIndices = filterFn => EFFECTS.map((n, i) => filterFn(n) ? i : -1).filter(i => i !== -1);
                
                const org = getIndices(n => n.includes('[O]'));
                const dyn = getIndices(n => !n.includes('[O]') && !n.includes('[C]') && !n.includes('[S]'));
                const chr = getIndices(n => n.includes('[C]'));
                const spr = getIndices(n => n.includes('[S]'));
                
                const sel = new Set([chr[Math.floor(Math.random() * chr.length)]]);
                shuffle(org).slice(0, Math.random() < 0.5 ? 3 : 4).forEach(i => sel.add(i));
                shuffle(dyn); let di=0; while(sel.size<8 && di<dyn.length) sel.add(dyn[di++]);
                shuffle(spr).slice(0, 1).forEach(i => sel.add(i)); // Ensure at least 1 spreader is explicitly enabled in UI
                
                sel.forEach(idx => AppState.enabledEffects[idx] = true);
                
                const allPals = [...Object.keys(PALETTE_DEFS.cyclic).map(k=>`cycle_${k}`), ...Object.keys(PALETTE_DEFS.static)];
                AppState.config.palette = allPals[Math.floor(Math.random() * allPals.length)];
                AppState.config.grainSize = [1, 2, 3][Math.floor(Math.random() * 3)];
                
                updateCanvasFilter();
                resizeEngine(); buildMenuDOM(); syncSave();
            };

            window.onresize = resizeEngine;
        }

        // ==========================================
        // 6. PHYSICS & SIMULATION ENGINE
        // ==========================================
        class Cell {
            constructor(id, isSpreader = false) {
                this.id = id; 
                this.isSpreader = isSpreader;
                this.x = Math.random() * AppState.width; 
                this.y = Math.random() * AppState.height;
                this.vx = 0; this.vy = 0; this.targetVx = 0; this.targetVy = 0;
                this.moveTimer = 0; this.reset();
            }
            reset() {
                if (this.isSpreader) {
                    // Spreaders are now appropriately sized and act as a gentle background sweep
                    const scale = 0.35 + Math.random() * 0.35; 
                    this.sizeW = this.sizeH = Math.min(AppState.width, AppState.height) * scale;
                    
                    // Pick only from UI-enabled spreaders, or fallback to random spreader
                    const enabledSpreaders = [];
                    for (let i = 69; i <= 78; i++) if (AppState.enabledEffects[i]) enabledSpreaders.push(i);
                    
                    if (enabledSpreaders.length > 0) {
                        this.effectIndex = enabledSpreaders[Math.floor(Math.random() * enabledSpreaders.length)];
                    } else {
                        this.effectIndex = 69 + Math.floor(Math.random() * 10);
                    }
                    
                    this.timer = 0; 
                    this.duration = 6000 + Math.random() * 4000;
                    this.rotation = 0; 
                    this.strengthBase = 1.5 + Math.random() * 1.5; 
                } else {
                    // Normal behavior for organic and fluid cells
                    const scale = 0.26 + Math.random() * 0.26;
                    this.sizeW = this.sizeH = Math.min(AppState.width, AppState.height) * scale;
                    
                    // Normal cells strictly prohibited from using spreader effects (indices 69+)
                    const validIndices = AppState.enabledEffects.map((val, idx) => (val && idx < 69) ? idx : -1).filter(idx => idx !== -1);
                    this.effectIndex = validIndices.length > 0 ? validIndices[Math.floor(Math.random() * validIndices.length)] : 0;
                    
                    this.timer = 0; 
                    this.duration = 10000 + Math.random() * 5000;
                    this.rotation = 0; 
                    this.strengthBase = 0.6 + Math.random() * 2.4;
                }
                
                this.changeMovement();
            }
            changeMovement() {
                if (this.isSpreader) {
                    // Spreaders get sweeping, fast, unrestricted movement to cover the whole canvas
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 3.0 + Math.random() * 5.0;
                    this.targetVx = Math.cos(angle) * speed; 
                    this.targetVy = Math.sin(angle) * speed;
                    this.moveTimer = 2000 + Math.random() * 3000;
                } else {
                    const angle = Math.floor(Math.random() * 4) * (Math.PI / 2);
                    const speed = 0.5 + Math.random() * 4.5;
                    this.targetVx = Math.cos(angle) * speed; 
                    this.targetVy = Math.sin(angle) * speed;
                    this.moveTimer = 1000 + Math.random() * 2000;
                }
            }
            update(dt) {
                this.timer += dt * CONSTANTS.MS_PER_FRAME;
                this.moveTimer -= dt * CONSTANTS.MS_PER_FRAME;
                
                // Only normal cells will self-reset if their effect gets disabled in the UI. 
                // The dedicated spreader bypasses this to guarantee baseline dispersion.
                const isDisabled = !this.isSpreader && !AppState.enabledEffects[this.effectIndex];
                
                if (this.timer >= this.duration || isDisabled) this.reset();
                else if (this.moveTimer <= 0) this.changeMovement();
                
                const inertiaEase = 1 - Math.pow(0.96, dt); 
                this.vx += (this.targetVx - this.vx) * inertiaEase;
                this.vy += (this.targetVy - this.vy) * inertiaEase;
                this.x += this.vx * dt; this.y += this.vy * dt;
                this.rotation += 0.015 * dt;
                
                if (this.x < 0) this.x += AppState.width; else if (this.x >= AppState.width) this.x -= AppState.width;
                if (this.y < 0) this.y += AppState.height; else if (this.y >= AppState.height) this.y -= AppState.height;
            }
        }

        function updateCellCount() {
            const targetCount = AppState.config.velocityLuma ? CONSTANTS.VELOCITY_CELL_COUNT : CONSTANTS.BASE_CELL_COUNT;
            
            // 1. Maintain exactly 1 dedicated Spreader Cell permanently
            let spreaders = AppState.cells.filter(c => c.isSpreader);
            if (spreaders.length === 0) spreaders.push(new Cell('spreader', true));
            else if (spreaders.length > 1) spreaders = [spreaders[0]];
            
            // 2. Maintain normal cells up to the target limit
            let normals = AppState.cells.filter(c => !c.isSpreader);
            while (normals.length < targetCount) {
                normals.push(new Cell(normals.length, false));
            }
            if (normals.length > targetCount) {
                normals.length = targetCount;
            }
            
            // 3. Commit new cell roster
            AppState.cells = [...spreaders, ...normals];
        }

        function resizeEngine() {
            AppState.width = canvas.width = Math.floor(window.innerWidth);
            AppState.height = canvas.height = Math.floor(window.innerHeight);
            if (AppState.width <= 0 || AppState.height <= 0) return;
            
            const grainArea = AppState.config.grainSize * AppState.config.grainSize;
            const newCount = Math.min(CONSTANTS.MAX_PARTICLES, Math.floor((AppState.width * AppState.height * CONSTANTS.COVERAGE_RATIO) / grainArea)); 
            
            const oldData = AppState.particleData;
            AppState.particleData = new Float32Array(newCount * 6); // STRIDE 6: [x, y, vx, vy, phase, luma]
            const isCompatible = oldData && oldData.length === AppState.particleCount * 6;
            
            for(let i=0; i<newCount; i++) {
                const offset = i * 6;
                if (isCompatible && i < AppState.particleCount) {
                    AppState.particleData.set(oldData.subarray(offset, offset+6), offset);
                } else {
                    AppState.particleData[offset] = Math.random() * AppState.width;
                    AppState.particleData[offset+1] = Math.random() * AppState.height;
                    AppState.particleData[offset+2] = 0;
                    AppState.particleData[offset+3] = 0;
                    AppState.particleData[offset+4] = Math.random() * 360;
                    AppState.particleData[offset+5] = 0; // Initialize Luma history
                }
            }
            AppState.particleCount = newCount;
            
            if (AppState.cells.length === 0) {
                updateCellCount();
            }
        }

        let fpsFrames = 0;
        let lastFpsTime = 0;

        function engineLoop(timestamp) {
            if (AppState.width <= 0 || AppState.height <= 0) return requestAnimationFrame(engineLoop);
            
            // FPS COUNTER LOGIC
            if (!lastFpsTime) lastFpsTime = timestamp;
            fpsFrames++;
            if (timestamp - lastFpsTime >= 1000) {
                $('fps-counter').innerText = `FPS: ${fpsFrames}`;
                fpsFrames = 0;
                lastFpsTime = timestamp;
            }

            // High Refresh Rate Pacing Guard
            const elapsed = timestamp - AppState.lastFrameTime;
            if (elapsed < 12) return requestAnimationFrame(engineLoop);

            const dt = Math.min(2.0, elapsed / CONSTANTS.MS_PER_FRAME); 
            AppState.lastFrameTime = timestamp;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.fillRect(0, 0, AppState.width, AppState.height);
            AppState.cells.forEach(cell => cell.update(dt));
            
            const imageData = ctx.getImageData(0, 0, AppState.width, AppState.height);
            const data32 = new Uint32Array(imageData.data.buffer);
            
            const { particleData, particleCount, cells, width, height, enabledEffects, effectStrengths, config } = AppState;
            const currentPalette = PALETTE_LUTS[config.palette];
            const gs = config.grainSize;
            const fPow = Math.pow(CONSTANTS.FRICTION, dt);
            const lumaDecayPow = Math.pow(CONSTANTS.LUMA_DECAY, dt); 
            const isStrobe = config.palette === 'cycle_strobe_hdr';
            const cycleSpeed = isStrobe ? 15.0 : 1.0;
            const useLuma = config.velocityLuma;
            const hardEdges = config.hardEdges;
            const halfW = width / 2; const halfH = height / 2;
            
            const maxS = config.maxSpeed;
            const maxSq = maxS * maxS;

            for (let i = 0; i < particleCount; i++) {
                const idx = i * 6; // Stride 6
                let px = particleData[idx]; let py = particleData[idx+1];
                let vx = particleData[idx+2]; let vy = particleData[idx+3];
                let phase = particleData[idx+4]; let luma = particleData[idx+5];

                // Influence mapping
                for (let c = 0; c < cells.length; c++) {
                    const cell = cells[c];
                    // The dedicated spreader overrides the 'enabledEffects' toggle
                    if (!cell.isSpreader && !enabledEffects[cell.effectIndex]) continue;
                    
                    let dx = px - cell.x; let dy = py - cell.y;
                    if (dx > halfW) dx -= width; else if (dx < -halfW) dx += width;
                    if (dy > halfH) dy -= height; else if (dy < -halfH) dy += height;
                    const hw = cell.sizeW / 2; const hh = cell.sizeH / 2;
                    
                    if (Math.abs(dx) < hw && Math.abs(dy) < hh) {
                        const nx = dx/hw; const ny = dy/hh;
                        const t = Math.max(Math.abs(nx), Math.abs(ny));
                        const edgeForce = hardEdges ? (t < 0.98 ? 1 : 0) : (1-t)*(1-t)*(3-2*(1-t));
                        const s = cell.strengthBase * edgeForce * dt * (effectStrengths[cell.effectIndex] * 0.01);
                        const angle = Math.atan2(dy, dx); const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        // Core physics registry map
                        switch(cell.effectIndex) {
                            // --- ORIGINALS ---
                            case 0: vx += (10*(ny*10-nx*10))*s*0.05; break;
                            case 1: vx += Math.cos(angle+1.5+cell.rotation)*s*4; vy += Math.sin(angle+1.5+cell.rotation)*s*4; break;
                            case 2: vx += Math.sin(py*0.01+cell.rotation*5)*s*6; break;
                            case 3: vx += Math.cos(angle)*Math.sin(dist*0.1-cell.rotation*10)*s*3; vy += Math.sin(angle)*Math.sin(dist*0.1-cell.rotation*10)*s*3; break;
                            case 4: vx += (Math.round(px/30)*30-px)*s*0.4; vy += (Math.round(py/25)*25-py)*s*0.4; break;
                            case 5: vx += Math.cos((Math.abs(px%40-20)+Math.abs(py%40-20)))*s*2; break;
                            case 6: vx += Math.cos(angle+1.57)*s*4; vy += Math.sin(angle+1.57)*s*4; break;
                            case 7: vx += Math.cos(angle)*s*5; vy += Math.sin(angle)*s*5; break;
                            case 8: vx -= Math.cos(angle)*s*4; vy -= Math.sin(angle)*s*4; break;
                            case 9: vx += (ny>0?1:-1)*s*5; break;
                            case 10: if (Math.abs(Math.sin((angle+cell.rotation)*8))>0.7){ vx += Math.cos(angle+1.57)*s*4; vy += Math.sin(angle+1.57)*s*4; } break;
                            case 11: vx += Math.sin(cell.rotation)*s*5; vy += Math.cos(cell.rotation)*s*5; break;
                            case 12: vy += Math.cos(px*0.02+cell.rotation*3)*s*5; break;
                            case 13: vx += Math.cos(angle+1.57)*Math.sin(dist*0.15-cell.rotation*4)*s*5; vy += Math.sin(angle+1.57)*Math.sin(dist*0.15-cell.rotation*4)*s*5; break;
                            case 14: vx += Math.sign(Math.sin(py*0.1))*s*3; break;
                            case 15: if (dist < hw/2) { vx += Math.cos(angle)*s*8; vy += Math.sin(angle)*s*8; } break;
                            case 16: vx += (Math.random()-0.5)*s*10; vy += (Math.random()-0.5)*s*10; break;
                            case 17: vx += Math.cos(angle)*(1+s*3); vy += Math.sin(angle)*(1+s*3); break;
                            case 18: vx -= (nx*5)*s; break;
                            case 19: vx += (Math.round(px/1125)*1125-px)*s*0.6; vy += (Math.round(py/1125)*1125-py)*s*0.6; break;
                            case 20: vx += Math.sin(py*0.05+cell.rotation*0.5)*s*3; vy += Math.sin(px*0.05-cell.rotation*0.5)*s*3; break;
                            case 21: if (Math.sin(px*0.1)*Math.sin(py*0.1)>0) vx += 2*s; break;
                            case 22: vx += Math.cos(angle)*Math.sin(cell.rotation*4)*5*s; vy += Math.sin(angle)*Math.sin(cell.rotation*4)*5*s; break;
                            case 23: vx += Math.tan(nx*0.5)*s*2; vy += Math.cos(ny*3)*s*3; break;
                            case 24: vx += Math.sin(py*0.05+cell.rotation*2)*s*5; break;
                            case 25: vx += Math.cos(px*0.01+py*0.01+cell.rotation)*s*4; vy += Math.sin(px*0.01-py*0.01+cell.rotation)*s*4; break;
                            case 26: vx += Math.cos(angle+1.57)*(Math.floor(dist/20)%2==0?1:-1)*s*4; vy += Math.sin(angle+1.57)*(Math.floor(dist/20)%2==0?1:-1)*s*4; break;
                            case 27: vx += dx*0.05*s; vy += dy*0.05*s; break;
                            case 28: vy -= 2*s; break;
                            case 29: vx += ((Math.floor(px/20)+Math.floor(py/20))%2==0?1:-1)*s*4; break;
                            case 30: vx += (Math.round(dx/375)*375-dx)*s*0.5; vy += (Math.round(dy/375)*375-dy)*s*0.5; break;
                            case 31: vx += (Math.round(px/15)*15-px)*s*0.8; vy += (Math.round(py/15)*15-py)*s*0.8; break;
                            case 32: vx += (Math.round(px/12)*12-px)*s*0.9; break;
                            case 33: vx += ((px+py)%30<(px-py)%30?1:-1)*s*2; break;
                            case 34: vx += (Math.round(px/100)*100-px)*s*0.3; vy += (Math.round(py/60)*60-py)*s*0.3; break;
                            case 35: { const spA = Math.round(angle*4)/4; vx += (Math.cos(spA)*dist-dx)*s*0.4; vy += (Math.sin(spA)*dist-dy)*s*0.4; break; }
                            case 36: vx += (Math.floor(px/40)*40+(py%40)-px)*s*0.5; break;
                            case 37: { const sdA = angle+dist*0.033; vx += (Math.cos(Math.round(sdA*10)/10)*dist-dx)*s*0.4; vy += (Math.sin(Math.round(sdA*10)/10)*dist-dy)*s*0.4; break; }
                            case 38: vx += ((Math.floor(px/300)+Math.floor(py/300))%2==0?1:-1)*s*3; break;
                            case 39: { const dSu = Math.round((px+py)/25)*25; const dDi = Math.round((px-py)/25)*25; vx += ((dSu+dDi)/2-px)*s*0.7; vy += ((dSu-dDi)/2-py)*s*0.7; break; }
                            case 40: { const gld = Math.PI*(3-Math.sqrt(5)); const fAng = Math.round(dist*0.1)*gld+cell.rotation; vx += (cell.x+Math.cos(fAng)*dist-px)*s*0.125; vy += (cell.y+Math.sin(fAng)*dist-py)*s*0.125; break; }
                            case 41: { const mX = nx*1.5-0.5; const mY = ny*1.5; let tx=0, ty=0, mi=0; while(tx*tx+ty*ty<=4 && mi < 8){ const xt=tx*tx-ty*ty+mX; ty=2*tx*ty+mY; tx=xt; mi++; } if(mi < 8){ vx += Math.cos(angle)*s*6; vy += Math.sin(angle)*s*6;} break; }
                            case 42: vx += (Math.floor(px/300)*300+150-px)*s*0.6; vy += (Math.floor(py/300)*300+150-py)*s*0.6; break;
                            case 43: vx += (Math.floor(nx*8+8)+Math.floor(ny*8+8))%2==0?Math.sin(cell.rotation)*s*5:-Math.sin(cell.rotation)*s*5; vy += (Math.floor(nx*8+8)+Math.floor(ny*8+8))%2==0?Math.cos(cell.rotation)*s*5:-Math.cos(cell.rotation)*s*5; break;
                            case 44: { const tAng = Math.atan2(py-height, px-width/2); vx += Math.cos(tAng)*s*4; vy += Math.sin(tAng)*s*4; break; }
                            case 45: { const ix = Math.round((px-py)/1.73/30)*30*1.73; const iy = Math.round((px+py)/30)*30; vx += (ix+iy/2-px)*s*0.35; vy += (iy/2-py)*s*0.35; break; }
                            case 46: if(Math.abs(angle-(cell.rotation*2)%(Math.PI*2))<0.1 || Math.abs(angle-(cell.rotation*2)%(Math.PI*2))>Math.PI*2-0.1){ vx += Math.cos(angle)*s*6; vy += Math.sin(angle)*s*6; } break;
                            case 47: { const cxS = Math.round(px/20)*20; const cyS = Math.round(py/20)*20; if(Math.abs(cxS-px)<Math.abs(cyS-py)) vx += (cxS-px)*s*0.9; else vy += (cyS-py)*s*0.9; break; }
                            case 48: if(px%45<5) vy += Math.sin(px*0.01)*s*4; if(py%45<5) vx += Math.cos(py*0.01)*s*4; break;
                            case 49: { const sdTX = Math.floor(cell.x/50)*50+Math.cos(cell.id)*hw; const sdTY = Math.floor(cell.y/50)*50+Math.sin(cell.id)*hh; vx += (sdTX-px)*s*0.048; vy += (sdTY-py)*s*0.048; break; }
                            case 50: vx += ((Math.floor(px/25)+Math.floor(py/25))%2==0?1:-1)*s*3; vy += -((Math.floor(px/25)+Math.floor(py/25))%2==0?1:-1)*s*3; break;
                            case 51: vx += Math.cos(angle)*s*3; vy += Math.sin(angle)*s*3; break;
                            case 56: vx += (Math.round(px/40)*40-px)*s*3.2; break;
                            case 65: vx += Math.cos(angle)*s*1.25; vy += Math.sin(angle)*s*1.25; break;
                            case 67: vx += Math.cos(angle)*Math.sin(dist*0.1 - cell.rotation)*s*1; break;
                            case 68: { const cgOfs = (phase/360)*20; vx += (Math.round((px + cgOfs)/30)*30 - cgOfs - px)*s*0.6; break; }
                            
                            // --- NEW SPREADERS (Indices 69-78) - Randomized Dispersion ---
                            case 69: { const rS = s * (1.0 + Math.random() * 2.0); const rA = angle + (Math.random() - 0.5); vx += Math.cos(rA) * rS * 12; vy += Math.sin(rA) * rS * 12; break; }
                            case 70: { const rS = s * (1.0 + Math.random() * 2.0); vx += (Math.sin(py * 0.05) + (Math.random()-0.5)) * rS * 8; vy += (Math.cos(px * 0.05) + (Math.random()-0.5)) * rS * 8; break; }
                            case 71: { const rS = s * (1.0 + Math.random() * 2.0); const rA = angle + (Math.random() - 0.5); vx += (Math.cos(rA) - Math.sin(rA)) * rS * 8; vy += (Math.sin(rA) + Math.cos(rA)) * rS * 8; break; }
                            case 72: { const rS = s * (1.0 + Math.random() * 2.0); vx += (Math.cos(px * 0.02 + py * 0.02) + (Math.random()-0.5)) * rS * 10; vy += (Math.sin(px * 0.02 - py * 0.02) + (Math.random()-0.5)) * rS * 10; break; }
                            case 73: { const rS = s * (1.0 + Math.random() * 2.0); vx += (Math.sign(dx) + (Math.random()-0.5)) * rS * 9; vy += (Math.sign(dy) + (Math.random()-0.5)) * rS * 9; break; }
                            case 74: { const rS = s * (1.0 + Math.random() * 2.0); const rA = angle + (Math.random() - 0.5); vx += Math.cos(rA * 5) * rS * 9; vy += Math.sin(rA * 5) * rS * 9; break; }
                            case 75: { const rS = s * (1.0 + Math.random() * 2.0); const rA = angle + (Math.random() - 0.5); const repel = Math.sin(dist * 0.1); vx += Math.cos(rA) * repel * rS * 10; vy += Math.sin(rA) * repel * rS * 10; break; }
                            case 76: { const rS = s * (1.0 + Math.random() * 2.0); vx += ((((py / 30 | 0) % 2 === 0) ? 1 : -1) + (Math.random()-0.5)) * rS * 8; vy += ((((px / 30 | 0) % 2 === 0) ? 1 : -1) + (Math.random()-0.5)) * rS * 8; break; }
                            case 77: { const rS = s * (1.0 + Math.random() * 2.0); const rA = angle + (Math.random() - 0.5); const m = Math.abs(Math.sin(rA * 3)) * rS * 12; vx += Math.cos(rA) * m; vy += Math.sin(rA) * m; break; }
                            case 78: { const rS = s * (1.0 + Math.random() * 2.0); const rA = angle + (Math.random() - 0.5); vx += Math.cos(rA + 0.8) * rS * 9; vy += Math.sin(rA + 0.8) * rS * 9; break; }
                        }
                    }
                }

                // MAX SPEED LIMIT CLAMP
                const speedSq = vx*vx + vy*vy;
                if (speedSq > maxSq) {
                    const m = maxS / Math.sqrt(speedSq);
                    vx *= m;
                    vy *= m;
                }

                px += vx * CONSTANTS.BASE_SPEED * dt;
                py += vy * CONSTANTS.BASE_SPEED * dt;
                vx *= fPow;
                vy *= fPow;
                phase = (phase + cycleSpeed * dt) % 360;

                if (px < 0) px += width; else if (px >= width) px -= width;
                if (py < 0) py += height; else if (py >= height) py -= height;

                // Luma Decay Logic scales with the dynamic max speed
                const currentV2 = (vx*vx + vy*vy);
                const targetLuma = Math.min(1.0, currentV2 / maxSq);
                luma = Math.max(targetLuma, luma * lumaDecayPow);

                particleData[idx] = px; particleData[idx+1] = py;
                particleData[idx+2] = vx; particleData[idx+3] = vy;
                particleData[idx+4] = phase; particleData[idx+5] = luma;

                let color = currentPalette[phase | 0];
                
                if (useLuma) {
                    const r = (color & 0xFF) * luma;
                    const g = ((color >> 8) & 0xFF) * luma;
                    const b = ((color >> 16) & 0xFF) * luma;
                    color = (255 << 24) | (b << 16) | (g << 8) | r;
                }

                const iPX = px|0; const iPY = py|0;
                if (gs === 1) {
                    data32[iPY * width + iPX] = color;
                } else {
                    for(let gy=0; gy<gs; gy++) {
                        const y_off = iPY + gy;
                        if (y_off >= height || y_off < 0) continue;
                        const row = y_off * width;
                        for(let gx=0; gx<gs; gx++) {
                            const x_off = iPX + gx;
                            if (x_off >= width || x_off < 0) continue;
                            data32[row + x_off] = color;
                        }
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            requestAnimationFrame(engineLoop);
        }

        setupUIEvents();
        updateCanvasFilter();
        resizeEngine(); 
        requestAnimationFrame(engineLoop);
    </script>
</body>
